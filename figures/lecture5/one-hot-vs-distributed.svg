<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="880" height="440" viewBox="0 0 880 440" font-family="Helvetica, Arial, sans-serif">

  <!-- one-hot panel -->
  <rect x="30" y="30" width="400" height="330" rx="10" fill="#F7F7F7" stroke="#BBBBBB" stroke-width="1.5"/>
  <text x="230" y="62" text-anchor="middle" font-size="15" font-weight="bold" fill="#555555">One-hot representation</text>

  <g font-size="13" font-family="Menlo, Consolas, monospace" fill="#444444">
    <text x="70" y="104">cat&#160;&#160;= [1, 0, 0, 0, 0]</text>
    <text x="70" y="136">dog&#160;&#160;= [0, 1, 0, 0, 0]</text>
    <text x="70" y="168">fish = [0, 0, 1, 0, 0]</text>
  </g>

  <text x="230" y="216" text-anchor="middle" font-size="12" fill="#777777">vocabulary-size <tspan font-style="italic">V</tspan> dimensions (sparse)</text>
  <rect x="90" y="240" width="280" height="40" rx="6" fill="#FBEDEB" stroke="#C0392B" stroke-width="1.3"/>
  <text x="230" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#962D22">cos(cat, dog) = 0</text>
  <text x="230" y="312" text-anchor="middle" font-size="12" fill="#7B3A33">all word pairs are orthogonal &#8212;</text>
  <text x="230" y="332" text-anchor="middle" font-size="12" fill="#7B3A33">semantic similarity cannot be expressed</text>

  <!-- distributed panel -->
  <rect x="450" y="30" width="400" height="330" rx="10" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="650" y="62" text-anchor="middle" font-size="15" font-weight="bold" fill="#18617E">Distributed representation (embedding)</text>

  <g font-size="13" font-family="Menlo, Consolas, monospace" fill="#18617E">
    <text x="490" y="104">cat&#160;&#160;= [0.8, 0.2, 0.9]</text>
    <text x="490" y="136">dog&#160;&#160;= [0.7, 0.3, 0.8]</text>
    <text x="490" y="168">fish = [0.9, 0.7, 0.1]</text>
  </g>

  <text x="650" y="216" text-anchor="middle" font-size="12" fill="#33617A">low-dimensional, dense (100&#8211;768 dims)</text>
  <rect x="510" y="240" width="280" height="40" rx="6" fill="#E4F4E9" stroke="#3E9C5C" stroke-width="1.3"/>
  <text x="650" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C7A46">cos(cat, dog) &#8776; 0.85</text>
  <text x="650" y="312" text-anchor="middle" font-size="12" fill="#33617A">similar meanings &#8594; nearby vectors,</text>
  <text x="650" y="332" text-anchor="middle" font-size="12" fill="#33617A">learned from data (<tspan font-style="italic">W</tspan><tspan dy="2" font-size="9">embed</tspan><tspan dy="-2">: </tspan><tspan font-style="italic">V</tspan> &#215; <tspan font-style="italic">d</tspan> matrix)</text>

  <text x="440" y="398" text-anchor="middle" font-size="12" fill="#555555">word2vec / GloVe: one static vector per word&#160;&#160;&#183;&#160;&#160;BERT: context-dependent vectors (resolves polysemy)</text>
  <text x="440" y="424" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Embeddings are the foundation that lets neural IR capture semantic similarity beyond exact matching</text>
</svg>
