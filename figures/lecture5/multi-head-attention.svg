<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="900" height="560" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- ===== left: scaled dot-product attention ===== -->
  <text x="220" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Scaled Dot-Product Attention</text>

  <rect x="140" y="60" width="160" height="36" rx="6" fill="#E87E2E"/>
  <text x="220" y="83" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">Output</text>

  <line x1="220" y1="130" x2="220" y2="100" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="140" y="132" width="160" height="36" rx="6" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="220" y="155" text-anchor="middle" font-size="12.5" fill="#18617E">MatMul (&#183; <tspan font-style="italic">V</tspan>)</text>

  <line x1="220" y1="202" x2="220" y2="172" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="140" y="204" width="160" height="36" rx="6" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="220" y="227" text-anchor="middle" font-size="12.5" fill="#18617E">SoftMax</text>

  <line x1="220" y1="274" x2="220" y2="244" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="140" y="276" width="160" height="36" rx="6" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="220" y="299" text-anchor="middle" font-size="12.5" fill="#18617E">Scale (&#247; &#8730;<tspan font-style="italic">d</tspan><tspan dy="2" font-size="9" font-style="italic">k</tspan><tspan dy="-2">)</tspan></text>

  <line x1="220" y1="346" x2="220" y2="316" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="140" y="348" width="160" height="36" rx="6" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="220" y="371" text-anchor="middle" font-size="12.5" fill="#18617E">MatMul (<tspan font-style="italic">QK</tspan><tspan dy="-5" font-size="9">T</tspan><tspan dy="5">)</tspan></text>

  <line x1="180" y1="430" x2="200" y2="388" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="430" x2="240" y2="388" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M320,448 C320,400 280,180 246,152" fill="none" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g font-size="13" font-weight="bold" text-anchor="middle">
    <text x="172" y="452" fill="#B35A0E">Q</text>
    <text x="266" y="452" fill="#18617E">K</text>
    <text x="320" y="468" fill="#33759B">V</text>
  </g>

  <!-- ===== right: multi-head ===== -->
  <text x="630" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#B35A0E">Multi-Head Attention</text>

  <rect x="550" y="60" width="160" height="36" rx="6" fill="#E87E2E"/>
  <text x="630" y="83" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">Output</text>

  <line x1="630" y1="130" x2="630" y2="100" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="550" y="132" width="160" height="36" rx="6" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="630" y="155" text-anchor="middle" font-size="12.5" fill="#7A3E0F">Linear (<tspan font-style="italic">W</tspan><tspan dy="-5" font-size="9">O</tspan><tspan dy="5">)</tspan></text>

  <line x1="630" y1="202" x2="630" y2="172" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="550" y="204" width="160" height="36" rx="6" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="630" y="227" text-anchor="middle" font-size="12.5" fill="#7A3E0F">Concat</text>

  <!-- heads -->
  <g stroke="#555555" stroke-width="1.3">
    <line x1="520" y1="300" x2="592" y2="244" marker-end="url(#arrow)"/>
    <line x1="630" y1="300" x2="630" y2="244" marker-end="url(#arrow)"/>
    <line x1="740" y1="300" x2="668" y2="244" marker-end="url(#arrow)"/>
  </g>

  <rect x="460" y="302" width="120" height="64" rx="7" fill="#2B87B8"/>
  <text x="520" y="328" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#FFFFFF">Attention</text>
  <text x="520" y="348" text-anchor="middle" font-size="10.5" fill="#D9ECF5">head 1</text>
  <rect x="590" y="302" width="80" height="64" rx="7" fill="#5BA6CC"/>
  <text x="630" y="340" text-anchor="middle" font-size="12" fill="#FFFFFF">&#8230;</text>
  <rect x="680" y="302" width="120" height="64" rx="7" fill="#2B87B8"/>
  <text x="740" y="328" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#FFFFFF">Attention</text>
  <text x="740" y="348" text-anchor="middle" font-size="10.5" fill="#D9ECF5">head <tspan font-style="italic">h</tspan></text>

  <g stroke="#555555" stroke-width="1.3">
    <line x1="520" y1="404" x2="520" y2="370" marker-end="url(#arrow)"/>
    <line x1="740" y1="404" x2="740" y2="370" marker-end="url(#arrow)"/>
  </g>

  <rect x="460" y="406" width="120" height="36" rx="6" fill="#FFFFFF" stroke="#7FB8D6"/>
  <text x="520" y="429" text-anchor="middle" font-size="11.5" fill="#18617E">Linear (per head)</text>
  <rect x="680" y="406" width="120" height="36" rx="6" fill="#FFFFFF" stroke="#7FB8D6"/>
  <text x="740" y="429" text-anchor="middle" font-size="11.5" fill="#18617E">Linear (per head)</text>

  <text x="630" y="474" text-anchor="middle" font-size="12.5" fill="#555555"><tspan font-style="italic">h</tspan> = 12 heads in BERT-Base; each head sees <tspan font-style="italic">d</tspan><tspan dy="2" font-size="9" font-style="italic">k</tspan><tspan dy="-2"> = 768/12 = 64 dims</tspan></text>

  <!-- bottom note -->
  <text x="450" y="516" text-anchor="middle" font-size="12" fill="#555555">Heads learn different relationship types: syntax (subject&#8211;predicate) &#183; semantics (synonyms) &#183; positional proximity</text>
  <text x="450" y="542" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Total cost &#8776; one full-width attention head (Vaswani et al., NeurIPS 2017)</text>
</svg>
