<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="640" height="600" viewBox="0 0 640 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- output -->
  <rect x="140" y="30" width="360" height="44" rx="8" fill="#E87E2E"/>
  <text x="320" y="57" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Contextualized embeddings (output)</text>

  <line x1="320" y1="106" x2="320" y2="78" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- encoder block -->
  <rect x="100" y="108" width="440" height="280" rx="12" fill="none" stroke="#2B87B8" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="554" y="252" font-size="13" font-weight="bold" fill="#2B87B8">&#215; <tspan font-style="italic">L</tspan> layers</text>

  <rect x="180" y="128" width="280" height="40" rx="6" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="320" y="153" text-anchor="middle" font-size="13" font-weight="bold" fill="#B35A0E">Add &#38; LayerNorm</text>

  <line x1="320" y1="206" x2="320" y2="172" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="180" y="208" width="280" height="40" rx="6" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="320" y="233" text-anchor="middle" font-size="13" font-weight="bold" fill="#18617E">Feed-Forward Network</text>

  <line x1="320" y1="286" x2="320" y2="252" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="180" y="288" width="280" height="40" rx="6" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="320" y="313" text-anchor="middle" font-size="13" font-weight="bold" fill="#B35A0E">Add &#38; LayerNorm</text>

  <line x1="320" y1="366" x2="320" y2="332" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="180" y="346" width="280" height="40" rx="6" fill="#2B87B8"/>
  <text x="320" y="371" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Multi-Head Self-Attention</text>

  <!-- residual shortcuts -->
  <path d="M320,404 C148,404 148,308 176,308" fill="none" stroke="#999999" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="143" y="362" font-size="10" fill="#999999" transform="rotate(-90 143 362)">residual</text>
  <path d="M320,268 C492,268 492,148 464,148" fill="none" stroke="#999999" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="497" y="212" font-size="10" fill="#999999" transform="rotate(90 497 212)">residual</text>

  <line x1="320" y1="442" x2="320" y2="390" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- embedding -->
  <rect x="140" y="444" width="160" height="40" rx="6" fill="#DDEEF7" stroke="#7FB8D6" stroke-width="1.5"/>
  <text x="220" y="469" text-anchor="middle" font-size="12.5" fill="#18617E">Embedding</text>
  <text x="320" y="470" text-anchor="middle" font-size="16" font-weight="bold" fill="#888888">+</text>
  <rect x="340" y="444" width="160" height="40" rx="6" fill="#DDEEF7" stroke="#7FB8D6" stroke-width="1.5"/>
  <text x="420" y="469" text-anchor="middle" font-size="12.5" fill="#18617E">Positional encoding</text>

  <line x1="320" y1="528" x2="320" y2="488" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="180" y="530" width="280" height="40" rx="6" fill="#F2F2F2" stroke="#BBBBBB" stroke-width="1.5"/>
  <text x="320" y="555" text-anchor="middle" font-size="12.5" fill="#444444">Input token sequence</text>

  <text x="320" y="594" text-anchor="middle" font-size="11.5" fill="#888888">BERT-Base: <tspan font-style="italic">L</tspan> = 12, <tspan font-style="italic">d</tspan> = 768, 110M params&#160;&#160;&#183;&#160;&#160;BERT-Large: <tspan font-style="italic">L</tspan> = 24, <tspan font-style="italic">d</tspan> = 1024, 340M params</text>
</svg>
