<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="640" height="520" viewBox="0 0 640 520" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="320" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">Feed-Forward Network (FFN)</text>
  <text x="320" y="58" text-anchor="middle" font-size="11.5" fill="#888888">applied independently to each token position</text>

  <!-- input -->
  <rect x="200" y="80" width="240" height="44" rx="8" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="320" y="107" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#18617E">Input: 768 dims</text>

  <line x1="320" y1="124" x2="320" y2="158" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="335" y="148" font-size="11" fill="#888888"><tspan font-style="italic">W</tspan><tspan dy="2" font-size="9">1</tspan><tspan dy="-2">: 768 &#215; 3072, + </tspan><tspan font-style="italic">b</tspan><tspan dy="2" font-size="9">1</tspan></text>

  <!-- hidden (wide box to suggest expansion) -->
  <rect x="100" y="160" width="440" height="64" rx="8" fill="#2B87B8"/>
  <text x="320" y="187" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Hidden layer: 3072 dims (4&#215; expansion)</text>
  <text x="320" y="209" text-anchor="middle" font-size="11.5" fill="#D9ECF5">GELU activation</text>

  <line x1="320" y1="224" x2="320" y2="258" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="335" y="248" font-size="11" fill="#888888"><tspan font-style="italic">W</tspan><tspan dy="2" font-size="9">2</tspan><tspan dy="-2">: 3072 &#215; 768, + </tspan><tspan font-style="italic">b</tspan><tspan dy="2" font-size="9">2</tspan></text>

  <!-- output -->
  <rect x="200" y="260" width="240" height="44" rx="8" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="320" y="287" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#B35A0E">Output: 768 dims</text>

  <!-- formula -->
  <rect x="120" y="338" width="400" height="46" rx="8" fill="#FFFFFF" stroke="#555555" stroke-width="1.5"/>
  <text x="320" y="367" text-anchor="middle" font-size="14" fill="#333333">FFN(<tspan font-style="italic">x</tspan>) = GELU(<tspan font-style="italic">x</tspan>&#8202;<tspan font-style="italic">W</tspan><tspan dy="3" font-size="10">1</tspan><tspan dy="-3"> + </tspan><tspan font-style="italic">b</tspan><tspan dy="3" font-size="10">1</tspan><tspan dy="-3">)&#8202;</tspan><tspan font-style="italic">W</tspan><tspan dy="3" font-size="10">2</tspan><tspan dy="-3"> + </tspan><tspan font-style="italic">b</tspan><tspan dy="3" font-size="10">2</tspan></text>

  <text x="320" y="424" text-anchor="middle" font-size="12" fill="#555555">Self-Attention decides <tspan font-weight="bold">what to gather</tspan>; the FFN decides <tspan font-weight="bold">how to transform</tspan> it &#8212;</text>
  <text x="320" y="444" text-anchor="middle" font-size="12" fill="#555555">and also acts as a key&#8211;value knowledge store (Geva et al., EMNLP 2021)</text>
  <text x="320" y="488" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Per BERT-Base layer: Self-Attention &#8776; 2.4M params, FFN &#8776; 4.7M (about 2/3 of the layer total)</text>
</svg>
