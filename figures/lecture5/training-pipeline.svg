<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="640" height="540" viewBox="0 0 640 540" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="320" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">Multi-Step Training Pipeline for Ranking</text>

  <rect x="140" y="60" width="360" height="52" rx="8" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="320" y="83" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#18617E">Pre-trained BERT (general)</text>
  <text x="320" y="103" text-anchor="middle" font-size="11" fill="#5B87A0">Wikipedia + BooksCorpus, MLM/NSP</text>

  <line x1="320" y1="112" x2="320" y2="146" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="335" y="136" font-size="11" font-weight="bold" fill="#2B87B8">TCP (optional): additional MLM on the target corpus &#8212; no labels needed</text>

  <rect x="140" y="148" width="360" height="52" rx="8" fill="#D6E9F4" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="320" y="171" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#18617E">Domain-adapted BERT</text>
  <text x="320" y="191" text-anchor="middle" font-size="11" fill="#4A7A93">&#8220;exposed&#8221; to the corpus vocabulary and style</text>

  <line x1="320" y1="200" x2="320" y2="234" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="335" y="224" font-size="11" font-weight="bold" fill="#2B87B8">pFT (optional): pre-fine-tune on a related task (e.g., MS MARCO, NLI)</text>

  <rect x="140" y="236" width="360" height="52" rx="8" fill="#BBDDEE" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="320" y="259" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#15425C">Pre-fine-tuned model</text>
  <text x="320" y="279" text-anchor="middle" font-size="11" fill="#33617A">general ranking knowledge acquired</text>

  <line x1="320" y1="288" x2="320" y2="322" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="335" y="312" font-size="11" font-weight="bold" fill="#E87E2E">FT: final fine-tuning on the target task data</text>

  <rect x="140" y="324" width="360" height="52" rx="8" fill="#E87E2E"/>
  <text x="320" y="347" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#FFFFFF">Final ranking model</text>
  <text x="320" y="367" text-anchor="middle" font-size="11" fill="#FBE3CD">adapted to the target collection (e.g., Robust04)</text>

  <!-- TCP effect chip -->
  <rect x="80" y="412" width="480" height="48" rx="8" fill="#EFF7FB" stroke="#B9D8E8" stroke-width="1.5"/>
  <text x="320" y="432" text-anchor="middle" font-size="11.5" fill="#33617A">TCP effect on MS MARCO: monoBERT 0.372 &#8594; monoBERT + TCP 0.379 (MRR@10)</text>
  <text x="320" y="450" text-anchor="middle" font-size="11" fill="#5B87A0">a modest but &#8220;free&#8221; improvement requiring no labels; larger gains in specialized domains</text>

  <text x="320" y="494" text-anchor="middle" font-size="11.5" fill="#A14D33">Caution: later training stages can overwrite earlier knowledge (catastrophic forgetting)</text>
  <text x="320" y="522" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Nogueira et al., 2019; Phang et al., 2018; Lin et al., 2021, &#167;3.2.4</text>
</svg>
