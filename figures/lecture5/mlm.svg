<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="720" height="500" viewBox="0 0 720 500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="360" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">Masked Language Model (MLM)</text>

  <!-- input sentence with mask -->
  <rect x="70" y="64" width="580" height="52" rx="8" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="360" y="96" text-anchor="middle" font-size="13.5" fill="#18617E">&#8220;The <tspan font-weight="bold" fill="#C0392B">[MASK]</tspan> leaves in Kyoto are best in November&#8221;</text>

  <line x1="360" y1="116" x2="360" y2="150" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="375" y="140" font-size="11" fill="#888888">BERT predicts the masked token from both left and right context</text>

  <!-- predictions -->
  <rect x="160" y="152" width="400" height="120" rx="8" fill="#FFFFFF" stroke="#7FB8D6" stroke-width="1.5"/>
  <g font-size="13" font-family="Menlo, Consolas, monospace">
    <text x="190" y="184" fill="#2C7A46">P(autumn | context) = 0.72&#160;&#160;&#10003;</text>
    <text x="190" y="214" fill="#888888">P(cherry | context) = 0.15</text>
    <text x="190" y="244" fill="#888888">P(flower | context) = 0.08</text>
  </g>

  <!-- masking strategy -->
  <rect x="70" y="300" width="580" height="80" rx="8" fill="#FDF4EA" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="360" y="326" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#B35A0E">Masking strategy: 15% of input tokens are selected, then</text>
  <text x="360" y="350" text-anchor="middle" font-size="12" fill="#7A5230">80% &#8594; replaced with [MASK]&#160;&#160;&#183;&#160;&#160;10% &#8594; random token&#160;&#160;&#183;&#160;&#160;10% &#8594; left unchanged</text>
  <text x="360" y="370" text-anchor="middle" font-size="11" fill="#9C7A56">loss is computed only on the masked positions</text>

  <text x="360" y="424" text-anchor="middle" font-size="12" fill="#555555">Solving billions of &#8220;fill-in-the-blank&#8221; problems teaches word meaning, syntax, and world knowledge</text>
  <text x="360" y="444" text-anchor="middle" font-size="12" fill="#555555">&#8212; no labels required (self-supervised)</text>
  <text x="360" y="478" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Devlin et al., &#8220;BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding&#8221;, NAACL, 2019</text>
</svg>
