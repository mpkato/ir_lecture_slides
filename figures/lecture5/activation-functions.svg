<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="640" height="460" viewBox="0 0 640 460" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="axisarrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#777777"/>
    </marker>
  </defs>

  <text x="320" y="34" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">Activation Functions</text>

  <!-- plot: x -4..4 -> 60..500 (55px/unit), y -1..4 -> 325..50 (55px/unit) -->
  <g stroke="#EDEDED" stroke-width="1">
    <line x1="60" y1="215" x2="500" y2="215"/>
    <line x1="60" y1="160" x2="500" y2="160"/>
    <line x1="60" y1="105" x2="500" y2="105"/>
    <line x1="60" y1="50" x2="500" y2="50"/>
  </g>
  <line x1="60" y1="270" x2="525" y2="270" stroke="#777777" stroke-width="1.5" marker-end="url(#axisarrow)"/>
  <line x1="280" y1="340" x2="280" y2="40" stroke="#777777" stroke-width="1.5" marker-end="url(#axisarrow)"/>
  <g font-size="11" fill="#777777">
    <text x="170" y="286" text-anchor="middle">&#8722;2</text>
    <text x="390" y="286" text-anchor="middle">2</text>
    <text x="500" y="286" text-anchor="middle">4</text>
    <text x="60" y="286" text-anchor="middle">&#8722;4</text>
    <text x="270" y="219" text-anchor="end">1</text>
    <text x="270" y="109" text-anchor="end">3</text>
    <text x="528" y="262" text-anchor="start" font-style="italic">x</text>
  </g>

  <!-- Sigmoid (gray) -->
  <path d="M60,269 L115,267.4 L170,263.5 L225,255.2 L280,242.5 L335,229.8 L390,221.6 L445,217.6 L500,216" fill="none" stroke="#9AA0A6" stroke-width="2.2"/>
  <text x="508" y="208" font-size="12" font-weight="bold" fill="#6B7075">Sigmoid</text>

  <!-- ReLU (orange dashed) -->
  <path d="M60,270 L280,270 L500,50" fill="none" stroke="#E87E2E" stroke-width="2.2" stroke-dasharray="7,5"/>
  <text x="446" y="74" text-anchor="end" font-size="12" font-weight="bold" fill="#B35A0E">ReLU</text>

  <!-- GELU (blue solid) -->
  <path d="M60,270 L115,270.2 L170,272.5 L225,278.7 L252,278.5 L280,270 L307,251 L335,223.7 L390,162.5 L445,105.2 L500,50" fill="none" stroke="#2B87B8" stroke-width="3"/>
  <text x="466" y="120" text-anchor="end" font-size="12.5" font-weight="bold" fill="#18617E">GELU</text>

  <text x="320" y="376" text-anchor="middle" font-size="12" fill="#555555">ReLU: max(0, <tspan font-style="italic">x</tspan>)&#160;&#160;&#183;&#160;&#160;Sigmoid: squashes to [0, 1]&#160;&#160;&#183;&#160;&#160;GELU: <tspan font-style="italic">x</tspan> &#183; &#934;(<tspan font-style="italic">x</tspan>) &#8212; a smooth approximation of ReLU</text>
  <text x="320" y="402" text-anchor="middle" font-size="12" fill="#555555">Non-linearity is what lets stacked layers approximate complex functions</text>
  <text x="320" y="430" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">The feed-forward layers in Transformer / BERT use GELU; it dips slightly below zero before rising</text>
</svg>
