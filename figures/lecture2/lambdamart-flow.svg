<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="640" height="480" viewBox="0 0 640 480" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="320" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">LambdaMART Training Loop</text>
  <text x="320" y="58" text-anchor="middle" font-size="11.5" fill="#888888">Lambda gradients + MART (gradient-boosted decision trees)</text>

  <rect x="110" y="84" width="420" height="56" rx="8" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="320" y="108" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#18617E">1. Compute &#955; gradients for all document pairs</text>
  <text x="320" y="128" text-anchor="middle" font-size="11.5" fill="#33617A">&#955; = RankNet gradient &#215; |&#916;nDCG|</text>

  <line x1="320" y1="140" x2="320" y2="174" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="110" y="176" width="420" height="56" rx="8" fill="#2B87B8"/>
  <text x="320" y="200" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#FFFFFF">2. Fit a regression tree</text>
  <text x="320" y="220" text-anchor="middle" font-size="11.5" fill="#D9ECF5">using the &#955; gradients as pseudo-residuals</text>

  <line x1="320" y1="232" x2="320" y2="266" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="110" y="268" width="420" height="56" rx="8" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="320" y="292" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#B35A0E">3. Update scores with the new tree</text>
  <text x="320" y="312" text-anchor="middle" font-size="11.5" fill="#7A5230">add the tree to the ensemble</text>

  <!-- loop arrow -->
  <path d="M534,296 C600,296 600,112 534,112" fill="none" stroke="#888888" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="606" y="208" text-anchor="middle" font-size="11.5" fill="#777777" transform="rotate(90 606 208)">repeat <tspan font-style="italic">T</tspan> times</text>

  <line x1="320" y1="324" x2="320" y2="358" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="140" y="360" width="360" height="48" rx="8" fill="#E87E2E"/>
  <text x="320" y="390" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Final model: ensemble of <tspan font-style="italic">T</tspan> trees</text>

  <text x="320" y="442" text-anchor="middle" font-size="12" fill="#555555">Trees capture nonlinear interactions, handle sparse features, and are fast at inference</text>
  <text x="320" y="466" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Winner of the Yahoo! LTR Challenge (2010); used in Microsoft Bing (Burges, MSR-TR-2010-82)</text>
</svg>
