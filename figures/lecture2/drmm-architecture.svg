<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="720" height="640" viewBox="0 0 720 640" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- query terms -->
  <text x="120" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="#18617E">Query terms</text>
  <rect x="60" y="56" width="120" height="32" rx="5" fill="#DDEEF7" stroke="#7FB8D6"/>
  <text x="120" y="77" text-anchor="middle" font-size="12" fill="#18617E">Kyoto</text>
  <rect x="60" y="98" width="120" height="32" rx="5" fill="#DDEEF7" stroke="#7FB8D6"/>
  <text x="120" y="119" text-anchor="middle" font-size="12" fill="#18617E">autumn</text>
  <rect x="60" y="140" width="120" height="32" rx="5" fill="#DDEEF7" stroke="#7FB8D6"/>
  <text x="120" y="161" text-anchor="middle" font-size="12" fill="#18617E">landmark</text>

  <!-- doc terms -->
  <text x="470" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="#B35A0E">Document terms</text>
  <g font-size="11.5" fill="#7A3E0F">
    <rect x="280" y="50" width="92" height="28" rx="5" fill="#FCEEDF" stroke="#E8A05D"/>
    <text x="326" y="69" text-anchor="middle">Arashiyama</text>
    <rect x="382" y="50" width="80" height="28" rx="5" fill="#FCEEDF" stroke="#E8A05D"/>
    <text x="422" y="69" text-anchor="middle">autumn</text>
    <rect x="472" y="50" width="76" height="28" rx="5" fill="#FCEEDF" stroke="#E8A05D"/>
    <text x="510" y="69" text-anchor="middle">Kyoto</text>
    <rect x="558" y="50" width="84" height="28" rx="5" fill="#FCEEDF" stroke="#E8A05D"/>
    <text x="600" y="69" text-anchor="middle">tourism</text>
  </g>

  <!-- similarity matrix -->
  <rect x="280" y="92" width="362" height="128" rx="7" fill="#FFFFFF" stroke="#999999" stroke-width="1.5"/>
  <text x="461" y="114" text-anchor="middle" font-size="12" font-weight="bold" fill="#555555">Similarity matrix <tspan font-style="italic">M</tspan>(<tspan font-style="italic">i</tspan>, <tspan font-style="italic">j</tspan>)</text>
  <g font-size="12.5" text-anchor="middle">
    <text x="326" y="146" fill="#888888">0.3</text><text x="422" y="146" fill="#888888">0.1</text><text x="510" y="146" font-weight="bold" fill="#C0392B">1.0</text><text x="600" y="146" fill="#888888">0.4</text>
    <text x="326" y="176" fill="#888888">0.1</text><text x="422" y="176" font-weight="bold" fill="#C0392B">1.0</text><text x="510" y="176" fill="#888888">0.1</text><text x="600" y="176" fill="#888888">0.2</text>
    <text x="326" y="206" fill="#888888">0.2</text><text x="422" y="206" fill="#888888">0.3</text><text x="510" y="206" fill="#888888">0.2</text><text x="600" y="206" fill="#666666">0.5</text>
  </g>
  <!-- row guides from query terms -->
  <g stroke="#CCCCCC" stroke-width="1" stroke-dasharray="3,3">
    <line x1="184" y1="72" x2="276" y2="142"/>
    <line x1="184" y1="114" x2="276" y2="172"/>
    <line x1="184" y1="156" x2="276" y2="202"/>
  </g>

  <line x1="461" y1="222" x2="461" y2="256" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="476" y="245" font-size="11" fill="#888888">histogramming (per query term)</text>

  <!-- histogram -->
  <rect x="280" y="258" width="362" height="110" rx="7" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="461" y="282" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#18617E">Matching histogram (5 bins)</text>
  <g fill="#2B87B8">
    <rect x="330" y="328" width="36" height="22" />
    <rect x="386" y="316" width="36" height="34"/>
    <rect x="442" y="336" width="36" height="14"/>
    <rect x="498" y="322" width="36" height="28"/>
    <rect x="554" y="300" width="36" height="50" fill="#E87E2E"/>
  </g>
  <line x1="310" y1="350" x2="612" y2="350" stroke="#7FB8D6" stroke-width="1"/>
  <text x="572" y="294" text-anchor="middle" font-size="9.5" fill="#B35A0E">exact match {1.0}</text>

  <line x1="461" y1="370" x2="461" y2="404" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FFN -->
  <rect x="330" y="406" width="262" height="46" rx="7" fill="#2B87B8"/>
  <text x="461" y="434" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Feed-forward network</text>

  <!-- gating -->
  <rect x="60" y="406" width="200" height="46" rx="7" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="160" y="425" text-anchor="middle" font-size="12" font-weight="bold" fill="#B35A0E">IDF-based gating <tspan font-style="italic">g</tspan><tspan dy="3" font-size="9" font-style="italic">i</tspan></text>
  <text x="160" y="443" text-anchor="middle" font-size="10.5" fill="#9C7A56">weights each query term</text>
  <path d="M264,429 L296,460 L330,486" fill="none" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="461" y1="452" x2="461" y2="486" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- score -->
  <rect x="336" y="490" width="250" height="46" rx="7" fill="#E87E2E"/>
  <text x="461" y="518" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">score(<tspan font-style="italic">q</tspan>, <tspan font-style="italic">d</tspan>) = &#931;<tspan dy="3" font-size="10" font-style="italic">i</tspan><tspan dy="-3"> </tspan><tspan font-style="italic">g</tspan><tspan dy="3" font-size="10" font-style="italic">i</tspan><tspan dy="-3"> &#215; </tspan><tspan font-style="italic">z</tspan><tspan dy="3" font-size="10" font-style="italic">i</tspan></text>

  <text x="360" y="576" text-anchor="middle" font-size="12" fill="#555555">A dedicated exact-match bin {1.0} lets DRMM capture both lexical and semantic matching</text>
  <text x="360" y="604" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Explicitly models term-level interactions (Guo et al., CIKM 2016)</text>
</svg>
