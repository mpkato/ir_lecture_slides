<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="880" height="520" viewBox="0 0 880 520" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- ===== Representation-based ===== -->
  <rect x="30" y="20" width="400" height="430" rx="10" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="230" y="52" text-anchor="middle" font-size="16" font-weight="bold" fill="#18617E">Representation-based</text>

  <rect x="70" y="80" width="140" height="36" rx="6" fill="#FFFFFF" stroke="#7FB8D6" stroke-width="1.5"/>
  <text x="140" y="103" text-anchor="middle" font-size="13" fill="#18617E"><tspan font-style="italic">q</tspan> &#8594; <tspan font-style="italic">v</tspan><tspan dy="3" font-size="10" font-style="italic">q</tspan></text>
  <rect x="250" y="80" width="140" height="36" rx="6" fill="#FFFFFF" stroke="#7FB8D6" stroke-width="1.5"/>
  <text x="320" y="103" text-anchor="middle" font-size="13" fill="#18617E"><tspan font-style="italic">d</tspan> &#8594; <tspan font-style="italic">v</tspan><tspan dy="3" font-size="10" font-style="italic">d</tspan></text>

  <line x1="140" y1="116" x2="212" y2="160" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="116" x2="248" y2="160" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="150" y="162" width="160" height="38" rx="6" fill="#2B87B8"/>
  <text x="230" y="186" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#FFFFFF">cos(<tspan font-style="italic">v</tspan><tspan dy="3" font-size="10" font-style="italic">q</tspan><tspan dy="-3">, </tspan><tspan font-style="italic">v</tspan><tspan dy="3" font-size="10" font-style="italic">d</tspan><tspan dy="-3">)</tspan></text>

  <g font-size="12.5">
    <text x="70" y="248" fill="#2C7A46">+&#160;document vectors can be pre-computed</text>
    <text x="70" y="272" fill="#2C7A46">+&#160;fast (approximate nearest-neighbor search)</text>
    <text x="70" y="304" fill="#A14D33">&#8722;&#160;cannot capture term-level interactions</text>
    <text x="70" y="328" fill="#A14D33">&#8722;&#160;tends to lower accuracy</text>
  </g>

  <text x="230" y="386" text-anchor="middle" font-size="13" font-weight="bold" fill="#18617E">Representative: DSSM</text>
  <text x="230" y="412" text-anchor="middle" font-size="11.5" fill="#5B87A0">encode independently &#8594; compare vectors</text>

  <!-- ===== Interaction-based ===== -->
  <rect x="450" y="20" width="400" height="430" rx="10" fill="#FDF4EA" stroke="#E87E2E" stroke-width="1.8"/>
  <text x="650" y="52" text-anchor="middle" font-size="16" font-weight="bold" fill="#B35A0E">Interaction-based</text>

  <rect x="490" y="80" width="140" height="36" rx="6" fill="#FFFFFF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="560" y="103" text-anchor="middle" font-size="13" fill="#7A3E0F"><tspan font-style="italic">q</tspan></text>
  <text x="650" y="103" text-anchor="middle" font-size="15" font-weight="bold" fill="#B35A0E">&#215;</text>
  <rect x="670" y="80" width="140" height="36" rx="6" fill="#FFFFFF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="740" y="103" text-anchor="middle" font-size="13" fill="#7A3E0F"><tspan font-style="italic">d</tspan></text>

  <line x1="560" y1="116" x2="632" y2="160" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="740" y1="116" x2="668" y2="160" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="540" y="162" width="220" height="38" rx="6" fill="#E87E2E"/>
  <text x="650" y="186" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#FFFFFF">similarity matrix &#8594; NN</text>

  <g font-size="12.5">
    <text x="490" y="248" fill="#2C7A46">+&#160;captures term-level interactions</text>
    <text x="490" y="272" fill="#2C7A46">+&#160;higher accuracy potential</text>
    <text x="490" y="304" fill="#A14D33">&#8722;&#160;no pre-computation (computed per query)</text>
    <text x="490" y="328" fill="#A14D33">&#8722;&#160;inefficient for large corpora</text>
  </g>

  <text x="650" y="386" text-anchor="middle" font-size="13" font-weight="bold" fill="#B35A0E">Representative: DRMM, KNRM</text>
  <text x="650" y="412" text-anchor="middle" font-size="11.5" fill="#9C7A56">model all query&#8211;document term pairs</text>

  <!-- bottom banner -->
  <rect x="180" y="468" width="520" height="38" rx="19" fill="#EFF7FB" stroke="#B9D8E8" stroke-width="1.5"/>
  <text x="440" y="492" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#18617E">BERT (Cross-encoder) combines the advantages of both &#8594; covered later</text>
</svg>
