<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="680" height="560" viewBox="0 0 680 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="200" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Query tower</text>
  <text x="480" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#B35A0E">Document tower</text>

  <!-- query tower -->
  <rect x="110" y="56" width="180" height="40" rx="6" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="200" y="81" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#18617E">Query <tspan font-style="italic">q</tspan></text>
  <line x1="200" y1="96" x2="200" y2="126" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="110" y="128" width="180" height="48" rx="6" fill="#FFFFFF" stroke="#7FB8D6" stroke-width="1.5"/>
  <text x="200" y="148" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#18617E">Word hashing</text>
  <text x="200" y="166" text-anchor="middle" font-size="10.5" fill="#5B87A0">letter trigrams (~30K dims)</text>
  <line x1="200" y1="176" x2="200" y2="206" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="110" y="208" width="180" height="48" rx="6" fill="#2B87B8"/>
  <text x="200" y="228" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">FC layers &#215; 3</text>
  <text x="200" y="246" text-anchor="middle" font-size="10.5" fill="#D9ECF5">fully connected + tanh</text>
  <line x1="200" y1="256" x2="200" y2="286" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="130" y="288" width="140" height="42" rx="6" fill="#FFFFFF" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="200" y="306" text-anchor="middle" font-size="13" font-weight="bold" fill="#18617E"><tspan font-style="italic">v</tspan><tspan dy="3" font-size="10" font-style="italic">q</tspan></text>
  <text x="200" y="322" text-anchor="middle" font-size="10.5" fill="#5B87A0">128-dim vector</text>

  <!-- document tower -->
  <rect x="390" y="56" width="180" height="40" rx="6" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="480" y="81" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#B35A0E">Document <tspan font-style="italic">d</tspan></text>
  <line x1="480" y1="96" x2="480" y2="126" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="390" y="128" width="180" height="48" rx="6" fill="#FFFFFF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="480" y="148" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#B35A0E">Word hashing</text>
  <text x="480" y="166" text-anchor="middle" font-size="10.5" fill="#9C7A56">letter trigrams (~30K dims)</text>
  <line x1="480" y1="176" x2="480" y2="206" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="390" y="208" width="180" height="48" rx="6" fill="#E87E2E"/>
  <text x="480" y="228" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">FC layers &#215; 3</text>
  <text x="480" y="246" text-anchor="middle" font-size="10.5" fill="#FBE3CD">fully connected + tanh</text>
  <line x1="480" y1="256" x2="480" y2="286" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="410" y="288" width="140" height="42" rx="6" fill="#FFFFFF" stroke="#E87E2E" stroke-width="1.8"/>
  <text x="480" y="306" text-anchor="middle" font-size="13" font-weight="bold" fill="#B35A0E"><tspan font-style="italic">v</tspan><tspan dy="3" font-size="10" font-style="italic">d</tspan></text>
  <text x="480" y="322" text-anchor="middle" font-size="10.5" fill="#9C7A56">128-dim vector</text>

  <!-- merge -->
  <line x1="200" y1="330" x2="306" y2="392" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="330" x2="374" y2="392" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="394" width="180" height="44" rx="7" fill="#2B87B8"/>
  <text x="340" y="421" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">cos(<tspan font-style="italic">v</tspan><tspan dy="3" font-size="10" font-style="italic">q</tspan><tspan dy="-3">, </tspan><tspan font-style="italic">v</tspan><tspan dy="3" font-size="10" font-style="italic">d</tspan><tspan dy="-3">)</tspan></text>

  <text x="340" y="478" text-anchor="middle" font-size="12" fill="#555555">Word hashing: &#8220;good&#8221; &#8594; #go, goo, ood, od# &#8212; 500K vocab &#8594; ~30K trigram dims (collisions: 0.0044%)</text>
  <text x="340" y="502" text-anchor="middle" font-size="12" fill="#555555">Training: Bing click-through data (click = positive, random = negative)</text>
  <text x="340" y="532" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">q and d are encoded independently &#8594; term-level interactions cannot be captured (Huang et al., CIKM 2013)</text>
</svg>
