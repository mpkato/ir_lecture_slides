<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="620" height="440" viewBox="0 0 620 440" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="axisarrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="310" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">RankNet Ordering Probability&#160;&#160;P(<tspan font-style="italic">d</tspan><tspan dy="3" font-size="11" font-style="italic">i</tspan><tspan dy="-3"> &#8827; </tspan><tspan font-style="italic">d</tspan><tspan dy="3" font-size="11" font-style="italic">j</tspan><tspan dy="-3">) = 1 / (1 + e</tspan><tspan dy="-6" font-size="10">&#8722;&#945;(s&#7522;&#8722;s&#11388;)</tspan><tspan dy="6">)</tspan></text>

  <!-- plot: x -6..6 -> 70..510, y 0..1 -> 300..80 -->
  <g stroke="#EDEDED" stroke-width="1">
    <line x1="70" y1="80" x2="510" y2="80"/>
    <line x1="70" y1="190" x2="510" y2="190"/>
  </g>
  <line x1="290" y1="60" x2="290" y2="300" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="4,4"/>

  <line x1="70" y1="300" x2="540" y2="300" stroke="#555555" stroke-width="1.5" marker-end="url(#axisarrow)"/>
  <line x1="70" y1="300" x2="70" y2="56" stroke="#555555" stroke-width="1.5" marker-end="url(#axisarrow)"/>

  <g font-size="11.5" fill="#777777">
    <text x="62" y="304" text-anchor="end">0.0</text>
    <text x="62" y="194" text-anchor="end">0.5</text>
    <text x="62" y="84" text-anchor="end">1.0</text>
    <text x="143" y="318" text-anchor="middle">&#8722;4</text>
    <text x="217" y="318" text-anchor="middle">&#8722;2</text>
    <text x="290" y="318" text-anchor="middle">0</text>
    <text x="363" y="318" text-anchor="middle">+2</text>
    <text x="437" y="318" text-anchor="middle">+4</text>
  </g>
  <text x="310" y="348" text-anchor="middle" font-size="13" fill="#333333">Score difference <tspan font-style="italic">s</tspan><tspan dy="3" font-size="10" font-style="italic">i</tspan><tspan dy="-3"> &#8722; </tspan><tspan font-style="italic">s</tspan><tspan dy="3" font-size="10" font-style="italic">j</tspan><tspan dy="-3"> &#8594;</tspan></text>
  <text x="30" y="190" text-anchor="middle" font-size="13" fill="#333333" transform="rotate(-90 30 190)">P(<tspan font-style="italic">d</tspan><tspan dy="2" font-size="10" font-style="italic">i</tspan><tspan dy="-2"> &#8827; </tspan><tspan font-style="italic">d</tspan><tspan dy="2" font-size="10" font-style="italic">j</tspan><tspan dy="-2">)</tspan></text>

  <!-- sigmoid curve (alpha = 1) -->
  <path d="M70,299.5 L106,299 L143,296 L180,289.8 L217,273.8 L253,240.8 L290,190 L327,139.2 L363,106.2 L400,90.2 L437,84 L473,81 L510,80.5" fill="none" stroke="#2B87B8" stroke-width="3"/>

  <!-- annotations -->
  <circle cx="290" cy="190" r="6" fill="#E87E2E"/>
  <text x="305" y="180" font-size="12" fill="#B35A0E"><tspan font-style="italic">s</tspan><tspan dy="2" font-size="9" font-style="italic">i</tspan><tspan dy="-2"> = </tspan><tspan font-style="italic">s</tspan><tspan dy="2" font-size="9" font-style="italic">j</tspan><tspan dy="-2"> &#8594; P = 0.5</tspan></text>

  <text x="455" y="64" text-anchor="middle" font-size="12" font-weight="bold" fill="#18617E">P &#8776; 1 (correct order)</text>
  <text x="160" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="#962D22">P &#8776; 0 (reversed order)</text>

  <text x="310" y="388" text-anchor="middle" font-size="12" fill="#555555">Only the score <tspan font-weight="bold">difference</tspan> matters &#8212; (10, 8) and (3, 1) give the same ordering probability</text>
  <text x="310" y="414" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">&#945; &#62; 0 controls the steepness of the curve (Burges et al., ICML 2005)</text>
</svg>
