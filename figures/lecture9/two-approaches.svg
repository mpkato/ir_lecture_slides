<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="860" height="440" viewBox="0 0 860 440" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="430" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">Two Approaches to Vocabulary Mismatch</text>

  <!-- query expansion -->
  <rect x="40" y="60" width="380" height="270" rx="10" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="230" y="92" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#18617E">Query expansion</text>
  <text x="230" y="112" text-anchor="middle" font-size="11.5" fill="#5B87A0">online &#8212; runs at search time, for every query</text>

  <rect x="70" y="138" width="120" height="44" rx="7" fill="#FFFFFF" stroke="#7FB8D6" stroke-width="1.5"/>
  <text x="130" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#18617E">Query <tspan font-style="italic">q</tspan></text>
  <line x1="194" y1="160" x2="226" y2="160" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="230" y="138" width="160" height="44" rx="7" fill="#2B87B8"/>
  <text x="310" y="158" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF"><tspan font-style="italic">q</tspan> + added terms</text>
  <text x="310" y="175" text-anchor="middle" font-size="10" fill="#D9ECF5">e.g., RM3, BERT-QE</text>

  <g font-size="12">
    <text x="70" y="222" fill="#2C7A46">+&#160;no re-indexing needed</text>
    <text x="70" y="246" fill="#2C7A46">+&#160;adapts to each query&#8217;s intent</text>
    <text x="70" y="278" fill="#A14D33">&#8722;&#160;adds search-time latency</text>
    <text x="70" y="302" fill="#A14D33">&#8722;&#160;short queries make expansion unstable</text>
  </g>

  <!-- document expansion -->
  <rect x="440" y="60" width="380" height="270" rx="10" fill="#FDF4EA" stroke="#E87E2E" stroke-width="1.8"/>
  <text x="630" y="92" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#B35A0E">Document expansion</text>
  <text x="630" y="112" text-anchor="middle" font-size="11.5" fill="#9C7A56">offline &#8212; runs once, at indexing time</text>

  <rect x="470" y="138" width="140" height="44" rx="7" fill="#FFFFFF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="540" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#B35A0E">Document <tspan font-style="italic">d</tspan></text>
  <line x1="614" y1="160" x2="646" y2="160" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="650" y="138" width="140" height="44" rx="7" fill="#E87E2E"/>
  <text x="720" y="158" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF"><tspan font-style="italic">d</tspan> + added terms</text>
  <text x="720" y="175" text-anchor="middle" font-size="10" fill="#FBE3CD">e.g., doc2query, DeepCT</text>

  <g font-size="12">
    <text x="470" y="222" fill="#2C7A46">+&#160;no search-time latency impact</text>
    <text x="470" y="246" fill="#2C7A46">+&#160;rich document context; benefits all queries</text>
    <text x="470" y="278" fill="#A14D33">&#8722;&#160;index grows; collection updates need</text>
    <text x="482" y="298" fill="#A14D33">reprocessing</text>
  </g>

  <text x="430" y="372" text-anchor="middle" font-size="12.5" fill="#555555">Lin et al. (2021) describe them as <tspan font-weight="bold">&#8220;yin and yang&#8221;</tspan> &#8212; two complementary approaches</text>
  <text x="430" y="402" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">They can be combined: apply RM3 on an index already expanded with doc2query</text>
</svg>
