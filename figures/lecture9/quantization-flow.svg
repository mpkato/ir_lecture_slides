<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="700" height="500" viewBox="0 0 700 500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="350" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">DeepCT: Quantization and Indexing Flow</text>

  <rect x="70" y="60" width="560" height="56" rx="8" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="350" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#18617E">DeepCT output (real-valued weights <tspan font-style="italic">w</tspan><tspan dy="3" font-size="10" font-style="italic">i</tspan><tspan dy="-3"> &#8712; [0, 1])</tspan></text>
  <text x="350" y="104" text-anchor="middle" font-size="12" font-family="Menlo, Consolas, monospace" fill="#33617A">{deep learning: 0.85, image: 0.72, of: 0.03, method: 0.61}</text>

  <line x1="350" y1="116" x2="350" y2="150" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="365" y="140" font-size="11.5" font-weight="bold" fill="#2B87B8">scaling: &#373;&#7522; = round(<tspan font-style="italic">w</tspan>&#7522; &#215; <tspan font-style="italic">N</tspan>),&#160;&#160;<tspan font-style="italic">N</tspan> = 100</text>

  <rect x="70" y="152" width="560" height="56" rx="8" fill="#D6E9F4" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="350" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#18617E">Quantized integer weights</text>
  <text x="350" y="196" text-anchor="middle" font-size="12" font-family="Menlo, Consolas, monospace" fill="#33617A">{deep learning: 85, image: 72, of: 3, method: 61}</text>

  <line x1="350" y1="208" x2="350" y2="242" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="365" y="232" font-size="11.5" font-weight="bold" fill="#E87E2E">store as pseudo-TF in the posting lists</text>

  <rect x="70" y="244" width="560" height="72" rx="8" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="350" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#B35A0E">Inverted index</text>
  <text x="350" y="290" text-anchor="middle" font-size="12" font-family="Menlo, Consolas, monospace" fill="#7A5230">"deep learning" &#8594; (doc1, tf=85), &#8230;</text>
  <text x="350" y="308" text-anchor="middle" font-size="12" font-family="Menlo, Consolas, monospace" fill="#7A5230">"image" &#8594; (doc1, tf=72), &#8230;</text>

  <!-- BM25 integration -->
  <rect x="70" y="348" width="560" height="76" rx="8" fill="#EFF7FB" stroke="#B9D8E8" stroke-width="1.5"/>
  <text x="350" y="372" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#18617E">Integration with BM25</text>
  <text x="350" y="394" text-anchor="middle" font-size="11.5" fill="#33617A">replace the original TF with the pseudo-TF &#183; IDF used as-is &#183; the BM25 formula is unchanged</text>
  <text x="350" y="412" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2C7A46">existing BM25 infrastructure works without modification</text>

  <text x="350" y="464" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Dai and Callan, &#8220;Context-Aware Sentence/Passage Term Importance Estimation For First Stage Retrieval&#8221;, 2019</text>
</svg>
