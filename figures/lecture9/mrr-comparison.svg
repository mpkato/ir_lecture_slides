    <line x1="70" y1="300" x2="600" y2="300"/>
    <line x1="70" y1="220" x2="600" y2="220"/>
    <line x1="70" y1="140" x2="600" y2="140"/>
  </g>
  <g font-size="11.5" fill="#777777" text-anchor="end">
