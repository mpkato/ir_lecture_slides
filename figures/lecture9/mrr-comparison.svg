    <text x="62" y="224">0.2</text>
    <text x="62" y="144">0.3</text>
  </g>
  <line x1="70" y1="70" x2="70" y2="380" stroke="#999999" stroke-width="1.5"/>
  <line x1="70" y1="380" x2="600" y2="380" stroke="#999999" stroke-width="1.5"/>

  <!-- bars: scale 0.35 -> 280px tall plot, baseline y=380 -->
  <rect x="100" y="232.8" width="120" height="147.2" fill="#C9CDD1"/>
  <text x="160" y="220" text-anchor="middle" font-size="15" font-weight="bold" fill="#6B7075">0.184</text>
  <text x="160" y="406" text-anchor="middle" font-size="13" fill="#444444">BM25</text>

  <rect x="260" y="185.6" width="120" height="194.4" fill="#7FBFDD"/>
  <text x="320" y="173" text-anchor="middle" font-size="15" font-weight="bold" fill="#33759B">0.243</text>
  <text x="320" y="406" text-anchor="middle" font-size="13" fill="#444444">DeepCT + BM25</text>

  <rect x="420" y="119.2" width="120" height="260.8" fill="#E87E2E"/>
  <text x="480" y="106" text-anchor="middle" font-size="15" font-weight="bold" fill="#B35A0E">0.326</text>
  <text x="480" y="406" text-anchor="middle" font-size="13" fill="#444444">DeepImpact</text>

  <!-- +77% annotation -->
