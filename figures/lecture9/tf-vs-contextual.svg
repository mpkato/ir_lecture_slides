<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="760" height="460" viewBox="0 0 760 460" font-family="Helvetica, Arial, sans-serif">

  <text x="380" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">TF vs Contextual Importance</text>
  <text x="380" y="58" text-anchor="middle" font-size="11.5" fill="#888888">document: &#8220;Recent deep learning for image recognition uses the recent methods on the recent datasets &#8230;&#8221;</text>

  <!-- TF panel -->
  <rect x="40" y="80" width="330" height="240" rx="10" fill="#F7F7F7" stroke="#BBBBBB" stroke-width="1.5"/>
  <text x="205" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#555555">TF-based weights (conventional)</text>

  <g font-size="12.5" font-family="Menlo, Consolas, monospace">
    <text x="80" y="148" fill="#C0392B" font-weight="bold">recent&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;= 3&#160;&#160;&#9650;</text>
    <text x="80" y="180" fill="#666666">deep learning&#160;&#160;&#160;&#160;&#160;= 1</text>
    <text x="80" y="212" fill="#666666">image recognition = 1</text>
  </g>

  <text x="205" y="262" text-anchor="middle" font-size="11.5" fill="#A14D33">raw counts ignore context &#8212;</text>
  <text x="205" y="282" text-anchor="middle" font-size="11.5" fill="#A14D33">a generic word outweighs the topic terms</text>

  <!-- DeepCT panel -->
  <rect x="390" y="80" width="330" height="240" rx="10" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="555" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Contextual importance (DeepCT)</text>

  <g font-size="12.5" font-family="Menlo, Consolas, monospace">
    <text x="430" y="148" fill="#18617E" font-weight="bold">deep learning&#160;&#160;&#160;&#160;&#160;= 0.85&#160;&#160;&#9650;</text>
    <text x="430" y="180" fill="#18617E" font-weight="bold">image recognition = 0.78&#160;&#160;&#9650;</text>
    <text x="430" y="212" fill="#999999">recent&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;= 0.12</text>
  </g>

  <text x="555" y="262" text-anchor="middle" font-size="11.5" fill="#2C7A46">BERT&#8217;s contextual understanding assigns</text>
  <text x="555" y="282" text-anchor="middle" font-size="11.5" fill="#2C7A46">high weights to the document&#8217;s main topic</text>

  <text x="380" y="368" text-anchor="middle" font-size="12.5" fill="#555555">DeepCT&#8217;s goal: replace raw TF with learned, context-dependent term importance</text>
  <text x="380" y="400" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Dai and Callan, &#8220;Context-Aware Sentence/Passage Term Importance Estimation For First Stage Retrieval&#8221;, 2019</text>
</svg>
