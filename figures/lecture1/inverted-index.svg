  <text x="205" y="149" text-anchor="middle" font-size="11" fill="#E8F3F9">df=2</text>
  <line x1="244" y1="144" x2="284" y2="144" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="290" y="124" width="110" height="40" rx="6" fill="#FFFFFF" stroke="#7FB8D6" stroke-width="1.5"/>
  <text x="345" y="149" text-anchor="middle" font-size="12" fill="#18617E"><tspan font-style="italic">d</tspan><tspan dy="3" font-size="9">1</tspan><tspan dy="-3"> (tf=1)</tspan></text>
  <line x1="402" y1="144" x2="426" y2="144" stroke="#AAAAAA" stroke-width="1.3" marker-end="url(#arrow)"/>
  <rect x="430" y="124" width="110" height="40" rx="6" fill="#FFFFFF" stroke="#7FB8D6" stroke-width="1.5"/>
