<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="760" height="440" viewBox="0 0 760 440" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="190" y="44" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Dictionary</text>
  <text x="520" y="44" text-anchor="middle" font-size="14" font-weight="bold" fill="#B35A0E">Posting lists</text>

  <!-- row 1: Kyoto -->
  <rect x="60" y="64" width="180" height="40" rx="6" fill="#2B87B8"/>
  <text x="110" y="89" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Kyoto</text>
  <text x="205" y="89" text-anchor="middle" font-size="11" fill="#D9ECF5">df=3</text>
  <line x1="244" y1="84" x2="284" y2="84" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
