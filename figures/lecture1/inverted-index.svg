  <text x="345" y="89" text-anchor="middle" font-size="12" fill="#18617E"><tspan font-style="italic">d</tspan><tspan dy="3" font-size="9">1</tspan><tspan dy="-3"> (tf=2)</tspan></text>
  <line x1="402" y1="84" x2="426" y2="84" stroke="#AAAAAA" stroke-width="1.3" marker-end="url(#arrow)"/>
  <rect x="430" y="64" width="110" height="40" rx="6" fill="#FFFFFF" stroke="#7FB8D6" stroke-width="1.5"/>
  <text x="485" y="89" text-anchor="middle" font-size="12" fill="#18617E"><tspan font-style="italic">d</tspan><tspan dy="3" font-size="9">3</tspan><tspan dy="-3"> (tf=1)</tspan></text>
  <line x1="542" y1="84" x2="566" y2="84" stroke="#AAAAAA" stroke-width="1.3" marker-end="url(#arrow)"/>
  <rect x="570" y="64" width="110" height="40" rx="6" fill="#FFFFFF" stroke="#7FB8D6" stroke-width="1.5"/>
  <text x="625" y="89" text-anchor="middle" font-size="12" fill="#18617E"><tspan font-style="italic">d</tspan><tspan dy="3" font-size="9">8</tspan><tspan dy="-3"> (tf=3)</tspan></text>

