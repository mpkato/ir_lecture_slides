<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="900" height="560" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">Query processing: DAAT vs TAAT&#160;&#160;&#8212;&#160;&#160;query &#8220;Kyoto tourism&#8221;</text>

  <!-- ===== DAAT panel ===== -->
  <rect x="30" y="56" width="840" height="220" rx="10" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="60" y="86" font-size="14" font-weight="bold" fill="#18617E">DAAT (Document-at-a-Time) &#8212; parallel traversal&#160;&#160;<tspan font-size="11" font-weight="normal" fill="#5B87A0">modern standard</tspan></text>

  <text x="135" y="126" text-anchor="end" font-size="12.5" font-weight="bold" fill="#18617E">Kyoto</text>
  <g font-size="12" font-family="Menlo, Consolas, monospace">
    <rect x="150" y="108" width="70" height="28" rx="5" fill="#2B87B8"/>
    <text x="185" y="127" text-anchor="middle" fill="#FFFFFF">d1</text>
    <rect x="230" y="108" width="70" height="28" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
    <text x="265" y="127" text-anchor="middle" fill="#18617E">d5</text>
    <rect x="310" y="108" width="70" height="28" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
    <text x="345" y="127" text-anchor="middle" fill="#18617E">d12</text>
    <rect x="390" y="108" width="70" height="28" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
    <text x="425" y="127" text-anchor="middle" fill="#18617E">d45</text>
  </g>

  <text x="135" y="176" text-anchor="end" font-size="12.5" font-weight="bold" fill="#18617E">tourism</text>
  <g font-size="12" font-family="Menlo, Consolas, monospace">
    <rect x="150" y="158" width="70" height="28" rx="5" fill="#2B87B8"/>
    <text x="185" y="177" text-anchor="middle" fill="#FFFFFF">d1</text>
    <rect x="230" y="158" width="70" height="28" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
    <text x="265" y="177" text-anchor="middle" fill="#18617E">d3</text>
    <rect x="310" y="158" width="70" height="28" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
    <text x="345" y="177" text-anchor="middle" fill="#18617E">d12</text>
    <rect x="390" y="158" width="70" height="28" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
    <text x="425" y="177" text-anchor="middle" fill="#18617E">d30</text>
  </g>

  <!-- pointers -->
  <line x1="185" y1="104" x2="185" y2="92" stroke="#E87E2E" stroke-width="2.5"/>
  <line x1="185" y1="200" x2="185" y2="188" stroke="#E87E2E" stroke-width="2.5"/>
  <text x="185" y="216" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#B35A0E">pointers aligned at d1</text>

  <rect x="500" y="108" width="340" height="92" rx="8" fill="#FFFFFF" stroke="#7FB8D6" stroke-width="1.5"/>
  <text x="670" y="134" text-anchor="middle" font-size="11.5" fill="#33617A">both pointers at d1 &#8594; compute the <tspan font-weight="bold">full score</tspan></text>
  <text x="670" y="154" text-anchor="middle" font-size="11.5" fill="#33617A">&#8594; insert into top-k heap &#8594; advance pointers</text>
  <text x="670" y="184" text-anchor="middle" font-size="11" fill="#2C7A46">+ memory-efficient &#183; early termination (WAND, MaxScore)</text>

  <text x="450" y="252" text-anchor="middle" font-size="11.5" fill="#33617A">one document is fully scored at a time, traversing all posting lists in parallel</text>

  <!-- ===== TAAT panel ===== -->
  <rect x="30" y="296" width="840" height="200" rx="10" fill="#F7F7F7" stroke="#BBBBBB" stroke-width="1.5"/>
  <text x="60" y="326" font-size="14" font-weight="bold" fill="#555555">TAAT (Term-at-a-Time) &#8212; sequential traversal&#160;&#160;<tspan font-size="11" font-weight="normal" fill="#999999">older approach</tspan></text>

  <text x="60" y="358" font-size="12" fill="#444444"><tspan font-weight="bold">Pass 1</tspan> &#8220;Kyoto&#8221;:&#160;&#160;<tspan font-family="Menlo, Consolas, monospace" font-size="11.5">d1:+2.9&#160;&#160;d5:+1.2&#160;&#160;d12:+0.8&#160;&#160;d45:+1.5</tspan></text>
  <text x="60" y="384" font-size="12" fill="#444444"><tspan font-weight="bold">Pass 2</tspan> &#8220;tourism&#8221;:&#160;&#160;<tspan font-family="Menlo, Consolas, monospace" font-size="11.5">d1:+2.1&#160;&#160;d3:+1.8&#160;&#160;d12:+0.5&#160;&#160;d30:+0.9</tspan></text>

  <rect x="60" y="404" width="780" height="36" rx="6" fill="#FFFFFF" stroke="#CCCCCC"/>
  <text x="450" y="427" text-anchor="middle" font-size="11.5" font-family="Menlo, Consolas, monospace" fill="#555555">accumulators: d1=5.0, d5=1.2, d12=1.3, d45=1.5, d3=1.8, d30=0.9&#160;&#160;&#8594; sort &#8594; top-k</text>

  <text x="450" y="470" text-anchor="middle" font-size="11" fill="#A14D33">&#8722; accumulators for all candidates (high memory) &#183; early termination is difficult</text>

  <text x="450" y="532" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Both can use skip pointers for fast-forwarding within posting lists</text>
</svg>
