<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="640" height="520" viewBox="0 0 640 520" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="320" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">Pseudo-Relevance Feedback (PRF)</text>

  <rect x="170" y="58" width="300" height="42" rx="7" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="320" y="84" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#18617E">Original query</text>

  <line x1="320" y1="100" x2="320" y2="130" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="170" y="132" width="300" height="42" rx="7" fill="#2B87B8"/>
  <text x="320" y="158" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#FFFFFF">Initial search (BM25)</text>

  <line x1="320" y1="174" x2="320" y2="204" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="130" y="206" width="380" height="42" rx="7" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="320" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#B35A0E">Assume the top-<tspan font-style="italic">k</tspan> results are &#8220;relevant&#8221;</text>

  <line x1="320" y1="248" x2="320" y2="278" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="335" y="268" font-size="10.5" fill="#888888">no user judgments needed</text>

  <rect x="130" y="280" width="380" height="42" rx="7" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="320" y="306" text-anchor="middle" font-size="13" font-weight="bold" fill="#B35A0E">Extract related terms for query expansion</text>

  <line x1="320" y1="322" x2="320" y2="352" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="170" y="354" width="300" height="42" rx="7" fill="#E87E2E"/>
  <text x="320" y="380" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#FFFFFF">Re-search with the expanded query</text>

  <text x="320" y="436" text-anchor="middle" font-size="12" fill="#555555">Origin: relevance feedback with explicit user judgments (Rocchio, 1971) &#8212;</text>
  <text x="320" y="456" text-anchor="middle" font-size="12" fill="#555555">PRF removes the user burden by trusting the initial top results</text>
  <text x="320" y="492" text-anchor="middle" font-size="11" font-style="italic" fill="#A14D33">Risk: counterproductive when the &#8220;top results are good&#8221; assumption fails (query drift)</text>
</svg>
