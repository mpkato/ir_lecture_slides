<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="680" height="460" viewBox="0 0 680 460" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="340" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">Preprocessing for Japanese Search</text>

  <rect x="120" y="60" width="440" height="44" rx="8" fill="#F2F2F2" stroke="#BBBBBB" stroke-width="1.5"/>
  <text x="340" y="87" text-anchor="middle" font-size="13.5" fill="#444444">Input: &#8220;Tokyo&#8217;s autumn-foliage spots&#8221; (no spaces between words)</text>

  <line x1="340" y1="104" x2="340" y2="138" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="355" y="128" font-size="11" fill="#888888">morphological analysis (MeCab / Sudachi / Kuromoji)</text>

  <!-- tokens with POS -->
  <rect x="120" y="140" width="440" height="84" rx="8" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.5"/>
  <g font-size="12.5">
    <rect x="150" y="156" width="90" height="30" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
    <text x="195" y="176" text-anchor="middle" fill="#18617E">Tokyo</text>
    <rect x="252" y="156" width="60" height="30" rx="5" fill="#EEEEEE" stroke="#BBBBBB"/>
    <text x="282" y="176" text-anchor="middle" fill="#888888">&#8217;s</text>
    <rect x="324" y="156" width="120" height="30" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
    <text x="384" y="176" text-anchor="middle" fill="#18617E">autumn foliage</text>
    <rect x="456" y="156" width="80" height="30" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
    <text x="496" y="176" text-anchor="middle" fill="#18617E">spots</text>
  </g>
  <g font-size="10" fill="#5B87A0" text-anchor="middle">
    <text x="195" y="206">noun</text>
    <text x="282" y="206">particle</text>
    <text x="384" y="206">noun</text>
    <text x="496" y="206">noun</text>
  </g>

  <line x1="340" y1="224" x2="340" y2="258" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="355" y="248" font-size="11" fill="#888888">stop-word removal (the particle &#8220;&#8217;s&#8221; is dropped)</text>

  <rect x="120" y="260" width="440" height="58" rx="8" fill="#2B87B8"/>
  <text x="340" y="284" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#FFFFFF">Tokyo&#160;&#160;&#183;&#160;&#160;autumn foliage&#160;&#160;&#183;&#160;&#160;spots</text>
  <text x="340" y="305" text-anchor="middle" font-size="11" fill="#D9ECF5">these terms are used to search the inverted index</text>

  <text x="340" y="362" text-anchor="middle" font-size="12" fill="#555555">N-gram indexing (character bi-grams) supplements morphological analysis,</text>
  <text x="340" y="382" text-anchor="middle" font-size="12" fill="#555555">handling unknown words and neologisms</text>
  <text x="340" y="424" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Major analyzers: MeCab (fast, academic standard) &#183; Sudachi (multi-granularity) &#183; Kuromoji (bundled with Lucene)</text>
</svg>
