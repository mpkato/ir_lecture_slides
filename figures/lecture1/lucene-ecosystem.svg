<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="820" height="420" viewBox="0 0 820 420" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="410" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">The Lucene Ecosystem</text>

  <!-- core -->
  <rect x="160" y="60" width="500" height="64" rx="10" fill="#2B87B8"/>
  <text x="410" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">Apache Lucene (core library)</text>
  <text x="410" y="110" text-anchor="middle" font-size="11.5" fill="#D9ECF5">Java full-text search library &#183; inverted index &#183; BM25 as the standard scoring function</text>

  <g stroke="#555555" stroke-width="1.5">
    <line x1="240" y1="124" x2="180" y2="166" marker-end="url(#arrow)"/>
    <line x1="410" y1="124" x2="410" y2="166" marker-end="url(#arrow)"/>
    <line x1="580" y1="124" x2="640" y2="166" marker-end="url(#arrow)"/>
  </g>

  <!-- platforms -->
  <rect x="60" y="170" width="220" height="92" rx="9" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="170" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Elasticsearch</text>
  <text x="170" y="222" text-anchor="middle" font-size="11" fill="#33617A">distributed search &#38; analytics</text>
  <text x="170" y="240" text-anchor="middle" font-size="11" fill="#33617A">log analysis, full-text search</text>

  <rect x="300" y="170" width="220" height="92" rx="9" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="410" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">OpenSearch</text>
  <text x="410" y="222" text-anchor="middle" font-size="11" fill="#33617A">Elasticsearch fork</text>
  <text x="410" y="240" text-anchor="middle" font-size="11" fill="#33617A">led by AWS</text>

  <rect x="540" y="170" width="220" height="92" rx="9" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="650" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Apache Solr</text>
  <text x="650" y="222" text-anchor="middle" font-size="11" fill="#33617A">enterprise search</text>
  <text x="650" y="240" text-anchor="middle" font-size="11" fill="#33617A">platform</text>

  <!-- anserini -->
  <rect x="160" y="290" width="500" height="56" rx="9" fill="#FDF4EA" stroke="#E87E2E" stroke-width="1.5"/>
  <text x="410" y="313" text-anchor="middle" font-size="13" font-weight="bold" fill="#B35A0E">Anserini &#8212; Lucene-based academic IR toolkit (Yang et al., 2017)</text>
  <text x="410" y="333" text-anchor="middle" font-size="11" fill="#9C7A56">aims for highly reproducible experiments; the standard BM25 baseline in IR research</text>

  <text x="410" y="384" text-anchor="middle" font-size="11.5" fill="#555555">Used by Twitter, Bloomberg, Netflix, Wikipedia, Reddit, and many more</text>
</svg>
