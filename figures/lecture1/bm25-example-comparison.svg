<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="640" height="500" viewBox="0 0 640 500" font-family="Helvetica, Arial, sans-serif">

  <text x="320" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">BM25 Worked Example &#8212; query &#8220;Kyoto tourism&#8221;</text>

  <!-- axis: 0..4.5 -> y 400..130 (60px per unit) -->
  <g stroke="#E6E6E6" stroke-width="1">
    <line x1="90" y1="340" x2="580" y2="340"/>
    <line x1="90" y1="280" x2="580" y2="280"/>
    <line x1="90" y1="220" x2="580" y2="220"/>
    <line x1="90" y1="160" x2="580" y2="160"/>
  </g>
  <g font-size="11.5" fill="#777777" text-anchor="end">
    <text x="82" y="404">0</text>
    <text x="82" y="344">1</text>
    <text x="82" y="284">2</text>
    <text x="82" y="224">3</text>
    <text x="82" y="164">4</text>
  </g>
  <line x1="90" y1="120" x2="90" y2="400" stroke="#999999" stroke-width="1.5"/>
  <line x1="90" y1="400" x2="580" y2="400" stroke="#999999" stroke-width="1.5"/>

  <!-- Doc 1 stacked bar: Kyoto 2.53 (h=151.8), tourism 1.73 (h=103.8); total 4.26 -->
  <rect x="160" y="248.2" width="140" height="151.8" fill="#2B87B8"/>
  <text x="230" y="330" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">&#8220;Kyoto&#8221;: 2.53</text>
  <rect x="160" y="144.4" width="140" height="103.8" fill="#E8A05D"/>
  <text x="230" y="201" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">&#8220;tourism&#8221;: 1.73</text>
  <text x="230" y="130" text-anchor="middle" font-size="15" font-weight="bold" fill="#18617E">4.26</text>
  <text x="230" y="424" text-anchor="middle" font-size="13" font-weight="bold" fill="#444444">Document 1</text>
  <text x="230" y="442" text-anchor="middle" font-size="11" fill="#888888">Kyoto guidebook (l=300)</text>

  <!-- Doc 2: Kyoto 0, tourism 1.93 (h=115.8) -->
  <rect x="390" y="284.2" width="140" height="115.8" fill="#E8A05D"/>
  <text x="460" y="348" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#FFFFFF">&#8220;tourism&#8221;: 1.93</text>
  <text x="460" y="270" text-anchor="middle" font-size="15" font-weight="bold" fill="#B35A0E">1.93</text>
  <text x="460" y="424" text-anchor="middle" font-size="13" font-weight="bold" fill="#444444">Document 2</text>
  <text x="460" y="442" text-anchor="middle" font-size="11" fill="#888888">Tokyo tourism guide (l=150)</text>
  <text x="460" y="252" text-anchor="middle" font-size="10.5" fill="#A14D33">&#8220;Kyoto&#8221;: 0 (term absent)</text>

  <text x="320" y="478" text-anchor="middle" font-size="12" fill="#555555">The high IDF (rarity) of &#8220;Kyoto&#8221; is decisive &#8212; Doc 2 has &#8220;tourism&#8221; often but lacks the key query term</text>
</svg>
