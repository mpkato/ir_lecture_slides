<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="720" height="400" viewBox="0 0 720 400" font-family="Helvetica, Arial, sans-serif">

  <text x="360" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">The Memex Concept (Bush, 1945)</text>

  <!-- documents -->
  <rect x="70" y="90" width="160" height="90" rx="9" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="150" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Doc A</text>
  <text x="150" y="150" text-anchor="middle" font-size="12" fill="#33617A">paper</text>

  <rect x="280" y="90" width="160" height="90" rx="9" fill="#FDF4EA" stroke="#E87E2E" stroke-width="1.8"/>
  <text x="360" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="#B35A0E">Doc B</text>
  <text x="360" y="150" text-anchor="middle" font-size="12" fill="#7A5230">patent</text>

  <rect x="490" y="90" width="160" height="90" rx="9" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="570" y="126" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Doc C</text>
  <text x="570" y="150" text-anchor="middle" font-size="12" fill="#33617A">book</text>

  <!-- associative links (bidirectional curved) -->
  <path d="M234,135 C255,118 259,118 276,135" fill="none" stroke="#888888" stroke-width="2"/>
  <path d="M234,145 C255,162 259,162 276,145" fill="none" stroke="#888888" stroke-width="2"/>
  <path d="M444,135 C465,118 469,118 486,135" fill="none" stroke="#888888" stroke-width="2"/>
  <path d="M444,145 C465,162 469,162 486,145" fill="none" stroke="#888888" stroke-width="2"/>
  <path d="M150,184 C220,260 500,260 570,184" fill="none" stroke="#BBBBBB" stroke-width="1.6" stroke-dasharray="6,5"/>

  <text x="360" y="218" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#666666">&#8212; associative links (&#8220;trails&#8221;) &#8212;</text>

  <text x="360" y="296" text-anchor="middle" font-size="12.5" fill="#555555">Users record connections between documents and explore knowledge by following links</text>
  <text x="360" y="320" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#18617E">&#8594; the intellectual origin of hypertext and the WWW</text>
  <text x="360" y="364" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Bush, &#8220;As We May Think&#8221;, The Atlantic, 1945 &#8212; envisioned before electronic computers existed</text>
</svg>
