<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="720" height="460" viewBox="0 0 720 460" font-family="Helvetica, Arial, sans-serif">

  <!-- query vocabulary panel -->
  <rect x="40" y="40" width="240" height="250" rx="9" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="160" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Query vocabulary</text>
  <text x="160" y="88" text-anchor="middle" font-size="10.5" fill="#5B87A0">terms entered by the user</text>

  <rect x="75" y="106" width="170" height="36" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
  <text x="160" y="129" text-anchor="middle" font-size="13" fill="#18617E">&#8220;tragic&#8221;</text>
  <rect x="75" y="156" width="170" height="36" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
  <text x="160" y="179" text-anchor="middle" font-size="13" fill="#18617E">&#8220;love&#8221;</text>
  <rect x="75" y="206" width="170" height="36" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
  <text x="160" y="229" text-anchor="middle" font-size="13" fill="#18617E">&#8220;story&#8221;</text>

  <!-- document vocabulary panel -->
  <rect x="440" y="40" width="240" height="250" rx="9" fill="#FDF4EA" stroke="#E87E2E" stroke-width="1.8"/>
  <text x="560" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#B35A0E">Document vocabulary</text>
  <text x="560" y="88" text-anchor="middle" font-size="10.5" fill="#9C7A56">terms in the relevant document</text>

  <rect x="475" y="106" width="170" height="36" rx="5" fill="#FFFFFF" stroke="#E8A05D"/>
  <text x="560" y="129" text-anchor="middle" font-size="13" fill="#7A3E0F">&#8220;star-crossed&#8221;</text>
  <rect x="475" y="156" width="170" height="36" rx="5" fill="#FFFFFF" stroke="#E8A05D"/>
  <text x="560" y="179" text-anchor="middle" font-size="13" fill="#7A3E0F">&#8220;lovers&#8221;</text>
  <rect x="475" y="206" width="170" height="36" rx="5" fill="#FFFFFF" stroke="#E8A05D"/>
  <text x="560" y="229" text-anchor="middle" font-size="13" fill="#7A3E0F">&#8220;tale&#8221;</text>

  <!-- broken links -->
  <g stroke="#BBBBBB" stroke-width="1.5" stroke-dasharray="6,4">
    <line x1="248" y1="124" x2="472" y2="124"/>
    <line x1="248" y1="174" x2="472" y2="174"/>
    <line x1="248" y1="224" x2="472" y2="224"/>
  </g>
  <g font-size="18" font-weight="bold" fill="#C0392B" text-anchor="middle">
    <text x="360" y="130">&#10005;</text>
    <text x="360" y="180">&#10005;</text>
    <text x="360" y="230">&#10005;</text>
  </g>

  <!-- BM25 score -->
  <rect x="250" y="316" width="220" height="44" rx="22" fill="#C0392B"/>
  <text x="360" y="344" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">BM25 score = 0</text>

  <text x="360" y="396" text-anchor="middle" font-size="12.5" fill="#555555">&#8220;tragic&#8221; &#8776; &#8220;star-crossed&#8221;,&#160;&#160;&#8220;love&#8221; &#8776; &#8220;lovers&#8221;,&#160;&#160;&#8220;story&#8221; &#8776; &#8220;tale&#8221; &#8212; semantically close, yet no exact term match</text>
  <text x="360" y="424" text-anchor="middle" font-size="12" font-style="italic" fill="#888888">Exact-match search can never find this relevant document (Furnas et al., 1987)</text>
</svg>
