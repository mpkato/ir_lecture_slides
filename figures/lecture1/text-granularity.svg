<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="680" height="480" viewBox="0 0 680 480" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="340" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">Search targets vary in granularity</text>

  <!-- nested boxes -->
  <rect x="80" y="60" width="520" height="270" rx="10" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="340" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Web pages / full papers</text>
  <text x="340" y="107" text-anchor="middle" font-size="11" fill="#5B87A0">thousands to tens of thousands of words</text>

  <rect x="130" y="124" width="420" height="186" rx="9" fill="#D6E9F4" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="340" y="152" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Paragraphs / passages</text>
  <text x="340" y="171" text-anchor="middle" font-size="11" fill="#4A7A93">Wikipedia paragraphs, ~100 words</text>

  <rect x="180" y="190" width="320" height="100" rx="8" fill="#BBDDEE" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="340" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#15425C">Sentences / tweets</text>
  <text x="340" y="250" text-anchor="middle" font-size="11" fill="#33617A">QA answer sentences &#8212; 1&#8211;2 sentences</text>

  <line x1="340" y1="334" x2="340" y2="368" stroke="#555555" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="170" y="372" width="340" height="46" rx="23" fill="#E87E2E"/>
  <text x="340" y="401" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#FFFFFF">All are called &#8220;documents&#8221; in IR</text>

  <text x="340" y="452" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">e.g., in MS MARCO a ~100-word passage is one &#8220;document&#8221; &#8212; this course consistently says &#8220;document ranking&#8221;</text>
</svg>
