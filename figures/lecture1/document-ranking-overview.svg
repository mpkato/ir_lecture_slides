<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="760" height="520" viewBox="0 0 760 520" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- query -->
  <rect x="60" y="30" width="380" height="56" rx="8" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="250" y="53" text-anchor="middle" font-size="13" font-weight="bold" fill="#18617E">Query <tspan font-style="italic">q</tspan></text>
  <text x="250" y="74" text-anchor="middle" font-size="13" fill="#33617A">&#8220;Kyoto autumn leaves best time&#8221;</text>

  <!-- corpus -->
  <rect x="540" y="120" width="170" height="80" rx="8" fill="#F2F2F2" stroke="#BBBBBB" stroke-width="1.5"/>
  <text x="625" y="152" text-anchor="middle" font-size="14" font-weight="bold" fill="#444444">Corpus</text>
  <text x="625" y="174" text-anchor="middle" font-size="11" fill="#777777">millions to billions</text>
  <text x="625" y="190" text-anchor="middle" font-size="11" fill="#777777">of documents</text>

  <line x1="250" y1="86" x2="250" y2="126" stroke="#555555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="536" y1="160" x2="448" y2="160" stroke="#555555" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ranking model -->
  <rect x="60" y="130" width="380" height="60" rx="8" fill="#2B87B8"/>
  <text x="250" y="155" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Document Ranking Model</text>
  <text x="250" y="176" text-anchor="middle" font-size="11.5" fill="#D9ECF5">estimate a relevance score for every document</text>

  <line x1="250" y1="190" x2="250" y2="226" stroke="#555555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="265" y="214" font-size="11" fill="#888888">sort by score, descending</text>

  <!-- ranked list -->
  <rect x="60" y="230" width="540" height="220" rx="8" fill="#FFFFFF" stroke="#7FB8D6" stroke-width="1.8"/>
  <text x="330" y="256" text-anchor="middle" font-size="13" font-weight="bold" fill="#18617E">Ranked list</text>

  <rect x="85" y="272" width="430" height="40" rx="5" fill="#2B87B8"/>
  <text x="100" y="297" font-size="12.5" font-weight="bold" fill="#FFFFFF">1.  Kyoto Autumn Leaves &#8212; Best Times</text>
  <rect x="528" y="278" width="52" height="28" rx="14" fill="#DDEEF7"/>
  <text x="554" y="297" text-anchor="middle" font-size="12" font-weight="bold" fill="#18617E">8.7</text>

  <rect x="85" y="322" width="430" height="40" rx="5" fill="#7FBFDD"/>
  <text x="100" y="347" font-size="12.5" fill="#15425C">2.  Arashiyama Autumn | Kyoto Tourism</text>
  <rect x="528" y="328" width="52" height="28" rx="14" fill="#EAF4FA"/>
  <text x="554" y="347" text-anchor="middle" font-size="12" font-weight="bold" fill="#33759B">7.2</text>

  <rect x="85" y="372" width="430" height="40" rx="5" fill="#E3F0F7" stroke="#BBD8E8"/>
  <text x="100" y="397" font-size="12.5" fill="#5B87A0">3.  Types of Autumn Leaves <tspan font-size="10.5" fill="#9AB4C2">(partial match only)</tspan></text>
  <rect x="528" y="378" width="52" height="28" rx="14" fill="#F4F4F4"/>
  <text x="554" y="397" text-anchor="middle" font-size="12" fill="#888888">3.1</text>

  <text x="100" y="436" font-size="13" fill="#9AB4C2">4.  &#8230;</text>

  <text x="330" y="490" text-anchor="middle" font-size="12" font-style="italic" fill="#888888">The goal of ranking is to place highly relevant documents at the top &#8212; ordering, not filtering</text>
</svg>
