<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="820" height="420" viewBox="0 0 820 420" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="410" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">Retriever&#8211;Reader Framework (Chen et al., 2017)</text>

  <!-- question -->
  <rect x="230" y="60" width="360" height="44" rx="8" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="410" y="87" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#18617E">Question: &#8220;How tall is Tokyo Tower?&#8221;</text>

  <line x1="410" y1="104" x2="410" y2="138" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- stage 1 retriever -->
  <text x="240" y="128" text-anchor="end" font-size="12" font-weight="bold" fill="#2B87B8">STAGE 1</text>
  <rect x="100" y="140" width="290" height="96" rx="9" fill="#E9F4FA" stroke="#2B87B8" stroke-width="2"/>
  <text x="245" y="172" text-anchor="middle" font-size="15" font-weight="bold" fill="#18617E">Retriever</text>
  <text x="245" y="196" text-anchor="middle" font-size="12" fill="#33617A">document ranking</text>
  <text x="245" y="216" text-anchor="middle" font-size="12" font-weight="bold" fill="#18617E">millions of docs &#8594; top 100</text>

  <line x1="394" y1="188" x2="426" y2="188" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- stage 2 reader -->
  <text x="540" y="128" text-anchor="end" font-size="12" font-weight="bold" fill="#E87E2E">STAGE 2</text>
  <rect x="430" y="140" width="290" height="96" rx="9" fill="#FDF4EA" stroke="#E87E2E" stroke-width="2"/>
  <text x="575" y="172" text-anchor="middle" font-size="15" font-weight="bold" fill="#B35A0E">Reader</text>
  <text x="575" y="196" text-anchor="middle" font-size="12" fill="#7A5230">reads the candidates</text>
  <text x="575" y="216" text-anchor="middle" font-size="12" font-weight="bold" fill="#B35A0E">100 docs &#8594; answer span</text>

  <line x1="575" y1="236" x2="575" y2="270" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- answer -->
  <rect x="430" y="272" width="290" height="44" rx="8" fill="#E87E2E"/>
  <text x="575" y="299" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#FFFFFF">Answer: &#8220;333 meters&#8221;</text>

  <!-- highlight -->
  <rect x="100" y="272" width="290" height="44" rx="8" fill="#EFF7FB" stroke="#B9D8E8" stroke-width="1.5"/>
  <text x="245" y="292" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#18617E">Document ranking = the Retriever</text>
  <text x="245" y="308" text-anchor="middle" font-size="11" fill="#33617A">the foundation of QA systems</text>

  <text x="410" y="360" text-anchor="middle" font-size="12" fill="#555555">Deployed as Google Featured Snippets and voice-assistant answers (Siri, Alexa, Google Assistant)</text>
  <text x="410" y="392" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Chen et al., &#8220;Reading Wikipedia to Answer Open-Domain Questions&#8221;, ACL, 2017</text>
</svg>
