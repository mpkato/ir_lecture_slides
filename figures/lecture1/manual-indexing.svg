<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="660" height="500" viewBox="0 0 660 500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="330" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">Early Search: Manual Indexing</text>

  <rect x="130" y="60" width="400" height="44" rx="8" fill="#F2F2F2" stroke="#BBBBBB" stroke-width="1.5"/>
  <text x="330" y="87" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#444444">Documents (papers, patents, &#8230;)</text>

  <line x1="330" y1="104" x2="330" y2="138" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="110" y="140" width="440" height="58" rx="8" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="330" y="164" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#18617E">A subject expert reads the document</text>
  <text x="330" y="184" text-anchor="middle" font-size="11.5" fill="#33617A">understands the content, selects terms from a controlled vocabulary</text>

  <line x1="330" y1="198" x2="330" y2="232" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="345" y="222" font-size="11" fill="#888888">indexing (a human intellectual activity)</text>

  <rect x="110" y="234" width="440" height="58" rx="8" fill="#2B87B8"/>
  <text x="330" y="258" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#FFFFFF">Assign descriptors</text>
  <text x="330" y="278" text-anchor="middle" font-size="11.5" fill="#D9ECF5">&#8220;information retrieval&#8221;&#160;&#160;&#8220;ranking&#8221;&#160;&#160;&#8220;evaluation&#8221;</text>

  <line x1="330" y1="292" x2="330" y2="326" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="110" y="328" width="440" height="58" rx="8" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="330" y="352" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#B35A0E">Boolean matching &#8212; no ranking</text>
  <text x="330" y="372" text-anchor="middle" font-size="11.5" font-family="Menlo, Consolas, monospace" fill="#7A5230">&#8220;information retrieval AND evaluation&#8221; &#8594; match / no match</text>

  <text x="330" y="430" text-anchor="middle" font-size="12" fill="#A14D33">Problems: does not scale &#183; inconsistency across indexers</text>
  <text x="330" y="462" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Superseded by automatic indexing based on word statistics (Luhn, 1958) &#8594; next slide</text>
</svg>
