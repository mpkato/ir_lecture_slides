  <text x="400" y="382 " text-anchor="middle" font-size="12" fill="#555555">monoBERT exceeds the best pre-BERT model (IRNet) by <tspan font-weight="bold" fill="#B35A0E">+0.094</tspan> &#8212; all-to-all attention beats partial interaction</text>
  <text x="400" y="406" text-anchor="middle" font-size="10.5" fill="#999999">Lexical: BM25 &#183; Interaction-based: KNRM, Conv-KNRM &#183; Representation+Interaction: IRNet &#183; Cross-encoder: monoBERT</text>
