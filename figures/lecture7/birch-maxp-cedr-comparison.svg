<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="900" height="520" viewBox="0 0 900 520" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- ===== column 1: Birch ===== -->
  <rect x="30" y="30" width="260" height="38" rx="6" fill="#2B87B8"/>
  <text x="160" y="54" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">Birch</text>

  <rect x="60" y="88" width="200" height="32" rx="5" fill="#F2F2F2" stroke="#BBBBBB"/>
  <text x="160" y="109" text-anchor="middle" font-size="13" fill="#444444">Document</text>
  <line x1="160" y1="120" x2="160" y2="142" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="60" y="144" width="200" height="32" rx="5" fill="#DDEEF7" stroke="#7FB8D6"/>
  <text x="160" y="165" text-anchor="middle" font-size="13" fill="#18617E">Split into sentences</text>
  <line x1="160" y1="176" x2="160" y2="198" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="60" y="200" width="200" height="44" rx="5" fill="#2B87B8"/>
  <text x="160" y="219" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">BERT</text>
  <text x="160" y="236" text-anchor="middle" font-size="11" fill="#D9ECF5">score each sentence</text>
  <line x1="160" y1="244" x2="160" y2="266" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="60" y="268" width="200" height="44" rx="5" fill="#DDEEF7" stroke="#7FB8D6"/>
  <text x="160" y="287" text-anchor="middle" font-size="12" fill="#18617E">Weighted sum of</text>
  <text x="160" y="303" text-anchor="middle" font-size="12" fill="#18617E">top-<tspan font-style="italic">n</tspan> sentence scores</text>
  <line x1="160" y1="312" x2="160" y2="334" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="60" y="336" width="200" height="36" rx="5" fill="#FFFFFF" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="160" y="359" text-anchor="middle" font-size="12.5" fill="#18617E">&#945;&#183;<tspan font-style="italic">s</tspan><tspan dy="3" font-size="9">BM25</tspan><tspan dy="-3">&#160;+ (1&#8722;&#945;)&#183;&#931;&#160;</tspan><tspan font-style="italic">w</tspan><tspan dy="3" font-size="9" font-style="italic">i</tspan><tspan dy="-3" font-style="italic">s</tspan><tspan dy="3" font-size="9" font-style="italic">i</tspan></text>

  <text x="160" y="404" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#18617E">Score aggregation</text>
  <text x="160" y="422" text-anchor="middle" font-size="11.5" fill="#666666">+ BM25 interpolation</text>

  <!-- ===== column 2: BERT-MaxP ===== -->
  <rect x="320" y="30" width="260" height="38" rx="6" fill="#E87E2E"/>
  <text x="450" y="54" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">BERT-MaxP</text>

  <rect x="350" y="88" width="200" height="32" rx="5" fill="#F2F2F2" stroke="#BBBBBB"/>
  <text x="450" y="109" text-anchor="middle" font-size="13" fill="#444444">Document</text>
  <line x1="450" y1="120" x2="450" y2="142" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="350" y="144" width="200" height="32" rx="5" fill="#FCEEDF" stroke="#E8A05D"/>
  <text x="450" y="165" text-anchor="middle" font-size="13" fill="#7A3E0F">Split into passages</text>
  <line x1="450" y1="176" x2="450" y2="198" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="350" y="200" width="200" height="44" rx="5" fill="#E87E2E"/>
  <text x="450" y="219" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">BERT</text>
  <text x="450" y="236" text-anchor="middle" font-size="11" fill="#FBE3CD">score each passage</text>
  <line x1="450" y1="244" x2="450" y2="266" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="350" y="268" width="200" height="44" rx="5" fill="#FCEEDF" stroke="#E8A05D"/>
  <text x="450" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#B35A0E">Max score</text>
  <line x1="450" y1="312" x2="450" y2="334" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="350" y="336" width="200" height="36" rx="5" fill="#FFFFFF" stroke="#E87E2E" stroke-width="1.5"/>
  <text x="450" y="359" text-anchor="middle" font-size="12.5" fill="#7A3E0F">max( <tspan font-style="italic">s</tspan><tspan dy="3" font-size="9">1</tspan><tspan dy="-3">, &#8230;,&#160;</tspan><tspan font-style="italic">s</tspan><tspan dy="3" font-size="9" font-style="italic">k</tspan><tspan dy="-3">&#160;)</tspan></text>

  <text x="450" y="404" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#B35A0E">Score aggregation</text>
  <text x="450" y="422" text-anchor="middle" font-size="11.5" fill="#666666">best passage only</text>

  <!-- ===== column 3: CEDR / PARADE ===== -->
  <rect x="610" y="30" width="260" height="38" rx="6" fill="#1F5F7A"/>
  <text x="740" y="54" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">CEDR / PARADE</text>

  <rect x="640" y="88" width="200" height="32" rx="5" fill="#F2F2F2" stroke="#BBBBBB"/>
  <text x="740" y="109" text-anchor="middle" font-size="13" fill="#444444">Document</text>
  <line x1="740" y1="120" x2="740" y2="142" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="640" y="144" width="200" height="32" rx="5" fill="#DDEEF7" stroke="#7FB8D6"/>
  <text x="740" y="165" text-anchor="middle" font-size="13" fill="#18617E">Split into passages</text>
  <line x1="740" y1="176" x2="740" y2="198" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="640" y="200" width="200" height="44" rx="5" fill="#1F5F7A"/>
  <text x="740" y="219" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">BERT</text>
  <text x="740" y="236" text-anchor="middle" font-size="11" fill="#C8DEE9">encode each passage</text>
  <line x1="740" y1="244" x2="740" y2="266" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="640" y="268" width="200" height="44" rx="5" fill="#DDEEF7" stroke="#7FB8D6"/>
  <text x="740" y="287" text-anchor="middle" font-size="12" fill="#18617E">Aggregate representations</text>
  <text x="740" y="303" text-anchor="middle" font-size="11" fill="#4A7A93">(Transformer / averaging)</text>
  <line x1="740" y1="312" x2="740" y2="334" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="640" y="336" width="200" height="36" rx="5" fill="#FFFFFF" stroke="#1F5F7A" stroke-width="1.5"/>
  <text x="740" y="359" text-anchor="middle" font-size="12.5" fill="#1F5F7A">Score</text>

  <text x="740" y="404" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1F5F7A">Representation aggregation</text>
  <text x="740" y="422" text-anchor="middle" font-size="11.5" fill="#666666">end-to-end training</text>

  <!-- shared insight -->
  <line x1="60" y1="448" x2="840" y2="448" stroke="#DDDDDD" stroke-width="1"/>
  <text x="450" y="480" text-anchor="middle" font-size="13" font-style="italic" fill="#555555">Shared insight: &#8220;a document&#8217;s relevance is determined by its most relevant portion&#8221;</text>
  <text x="450" y="500" text-anchor="middle" font-size="11" fill="#999999">Robust04 nDCG@20 &#8212; Birch: 0.529 vs BERT-MaxP: 0.533 (roughly equivalent)</text>
</svg>
