<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="640" height="540" viewBox="0 0 640 540" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- document -->
  <rect x="220" y="24" width="200" height="40" rx="6" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="320" y="49" text-anchor="middle" font-size="15" font-weight="bold" fill="#18617E">Document <tspan font-style="italic">D</tspan></text>

  <line x1="320" y1="66" x2="320" y2="98" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="335" y="87" font-size="11" fill="#888888">split at sentence boundaries</text>

  <!-- sentences -->
  <rect x="170" y="100" width="300" height="40" rx="6" fill="#FFFFFF" stroke="#7FB8D6" stroke-width="1.5"/>
  <text x="320" y="125" text-anchor="middle" font-size="14" fill="#18617E">Sentences: <tspan font-style="italic">s</tspan><tspan dy="3" font-size="10">1</tspan><tspan dy="-3">,&#160;</tspan><tspan font-style="italic">s</tspan><tspan dy="3" font-size="10">2</tspan><tspan dy="-3">, &#8230;,&#160;</tspan><tspan font-style="italic">s</tspan><tspan dy="3" font-size="10" font-style="italic">m</tspan></text>

  <line x1="320" y1="142" x2="320" y2="174" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- BERT -->
  <rect x="120" y="176" width="400" height="58" rx="7" fill="#2B87B8"/>
  <text x="320" y="200" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">BERT( [CLS] <tspan font-style="italic">q</tspan> [SEP] <tspan font-style="italic">s</tspan><tspan dy="3" font-size="11" font-style="italic">i</tspan><tspan dy="-3">&#160;[SEP] )</tspan></text>
  <text x="320" y="221" text-anchor="middle" font-size="12" fill="#D9ECF5">each sentence is scored with the query independently</text>

  <line x1="320" y1="236" x2="320" y2="268" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- sentence scores -->
  <rect x="170" y="270" width="300" height="40" rx="6" fill="#FFFFFF" stroke="#7FB8D6" stroke-width="1.5"/>
  <text x="320" y="295" text-anchor="middle" font-size="14" fill="#18617E">Sentence scores: <tspan font-style="italic">s</tspan><tspan dy="3" font-size="10">1</tspan><tspan dy="-3">,&#160;</tspan><tspan font-style="italic">s</tspan><tspan dy="3" font-size="10">2</tspan><tspan dy="-3">, &#8230;,&#160;</tspan><tspan font-style="italic">s</tspan><tspan dy="3" font-size="10" font-style="italic">m</tspan></text>

  <line x1="320" y1="312" x2="320" y2="344" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- top-n selection -->
  <rect x="170" y="346" width="300" height="40" rx="6" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="320" y="371" text-anchor="middle" font-size="14" font-weight="bold" fill="#B35A0E">Select top-<tspan font-style="italic">n</tspan> sentence scores</text>

  <!-- BM25 side input -->
  <rect x="20" y="370" width="160" height="40" rx="6" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="100" y="395" text-anchor="middle" font-size="13" font-weight="bold" fill="#18617E">BM25 score <tspan font-style="italic">s</tspan><tspan dy="3" font-size="10" font-style="italic">d</tspan></text>

  <path d="M100,410 L100,470 L142,470" fill="none" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="112" y="448" font-size="12" font-weight="bold" fill="#555555">&#215; &#945;</text>

  <line x1="320" y1="388" x2="320" y2="436" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="332" y="420" font-size="12" font-weight="bold" fill="#555555">&#215; (1 &#8722; &#945;)</text>

  <!-- final score -->
  <rect x="150" y="440" width="340" height="62" rx="7" fill="#E87E2E"/>
  <text x="320" y="464" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Final score</text>
  <text x="320" y="488" text-anchor="middle" font-size="14" fill="#FFFFFF"><tspan font-style="italic">s</tspan><tspan dy="3" font-size="10" font-style="italic">f</tspan><tspan dy="-3">&#160;= &#945; &#183;&#160;</tspan><tspan font-style="italic">s</tspan><tspan dy="3" font-size="10" font-style="italic">d</tspan><tspan dy="-3">&#160;+ (1 &#8722; &#945;) &#183; &#931;&#160;</tspan><tspan font-style="italic">w</tspan><tspan dy="3" font-size="10" font-style="italic">i</tspan><tspan dy="-3">&#160;</tspan><tspan font-style="italic">s</tspan><tspan dy="3" font-size="10" font-style="italic">i</tspan></text>

  <text x="320" y="528" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Training uses short texts (tweets) &#8212; relevance judgment transfers to sentences zero-shot</text>
</svg>
