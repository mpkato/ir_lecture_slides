<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="900" height="400" viewBox="0 0 900 400" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
    <marker id="arrowdash" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- corpus -->
  <rect x="30" y="120" width="140" height="90" rx="8" fill="#F2F2F2" stroke="#BBBBBB" stroke-width="1.5"/>
  <text x="100" y="156" text-anchor="middle" font-size="15" font-weight="bold" fill="#444444">Corpus</text>
  <text x="100" y="178" text-anchor="middle" font-size="11" fill="#777777">millions to billions</text>
  <text x="100" y="194" text-anchor="middle" font-size="11" fill="#777777">of documents</text>

  <line x1="172" y1="165" x2="226" y2="165" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- stage 1 -->
  <text x="325" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#2B87B8" letter-spacing="1">STAGE 1</text>
  <rect x="230" y="90" width="190" height="150" rx="10" fill="#E9F4FA" stroke="#2B87B8" stroke-width="2"/>
  <text x="325" y="126" text-anchor="middle" font-size="19" font-weight="bold" fill="#18617E">BM25</text>
  <text x="325" y="150" text-anchor="middle" font-size="12" fill="#33617A">inverted index</text>
  <text x="325" y="170" text-anchor="middle" font-size="12" fill="#33617A">~10 ms / query</text>
  <text x="325" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">&#8594; top 1,000</text>

  <line x1="422" y1="165" x2="486" y2="165" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- stage 2 -->
  <text x="585" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#E87E2E" letter-spacing="1">STAGE 2</text>
  <rect x="490" y="90" width="190" height="150" rx="10" fill="#FDF4EA" stroke="#E87E2E" stroke-width="2"/>
  <text x="585" y="126" text-anchor="middle" font-size="19" font-weight="bold" fill="#B35A0E">BERT</text>
  <text x="585" y="150" text-anchor="middle" font-size="12" fill="#7A5230">Cross-encoder</text>
  <text x="585" y="170" text-anchor="middle" font-size="12" fill="#7A5230">~30 ms / document</text>
  <text x="585" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#B35A0E">&#8594; top 10</text>

  <line x1="682" y1="165" x2="736" y2="165" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- final results -->
  <rect x="740" y="130" width="130" height="70" rx="8" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="805" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Final</text>
  <text x="805" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">results</text>

  <!-- query -->
  <text x="455" y="316" text-anchor="middle" font-size="14" font-weight="bold" fill="#555555">Query <tspan font-style="italic">q</tspan></text>
  <path d="M430,300 L327,246" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowdash)"/>
  <path d="M480,300 L583,246" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowdash)"/>

  <!-- focus labels -->
  <text x="325" y="368" text-anchor="middle" font-size="13" font-weight="bold" fill="#2B87B8">Recall-focused &#183; fast</text>
  <text x="585" y="368" text-anchor="middle" font-size="13" font-weight="bold" fill="#E87E2E">Precision-focused &#183; accurate</text>
</svg>
