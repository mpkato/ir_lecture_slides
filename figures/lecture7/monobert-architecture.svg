<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="640" height="565" viewBox="0 0 640 565" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- Output probability -->
  <rect x="242" y="30" width="200" height="42" rx="6" fill="#FCEEDF" stroke="#E87E2E" stroke-width="1.5"/>
  <text x="342" y="56" text-anchor="middle" font-size="15" font-weight="bold" fill="#B35A0E">P(Relevant | <tspan font-style="italic">q</tspan>, <tspan font-style="italic">d</tspan>)</text>

  <line x1="342" y1="148" x2="342" y2="78" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Linear + Softmax -->
  <rect x="242" y="150" width="200" height="40" rx="6" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="342" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Linear + Softmax</text>

  <!-- h_[CLS] to Linear -->
  <path d="M102,238 L102,170 L235,170" fill="none" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="120" y="212" font-size="11" fill="#888888" font-style="italic">uses the [CLS] output only</text>

  <!-- h_[CLS] -->
  <rect x="62" y="240" width="80" height="32" rx="6" fill="#FFFFFF" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="102" y="261" text-anchor="middle" font-size="13" fill="#18617E"><tspan font-style="italic" font-weight="bold">h</tspan><tspan dy="3" font-size="9">[CLS]</tspan></text>

  <line x1="102" y1="328" x2="102" y2="278" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- BERT encoder -->
  <rect x="62" y="330" width="510" height="72" rx="8" fill="#D6E9F4" stroke="#2B87B8" stroke-width="2"/>
  <text x="317" y="362" text-anchor="middle" font-size="18" font-weight="bold" fill="#18617E">BERT Encoder</text>
  <text x="317" y="384" text-anchor="middle" font-size="12" fill="#4A7A93">12 / 24 layers &#183; Self-Attention</text>

  <!-- token input arrows -->
  <g stroke="#555555" stroke-width="1.2">
    <line x1="90"  y1="446" x2="90"  y2="408" marker-end="url(#arrow)"/>
    <line x1="147" y1="446" x2="147" y2="408" marker-end="url(#arrow)"/>
    <line x1="197" y1="446" x2="197" y2="408" marker-end="url(#arrow)"/>
    <line x1="254" y1="446" x2="254" y2="408" marker-end="url(#arrow)"/>
    <line x1="311" y1="446" x2="311" y2="408" marker-end="url(#arrow)"/>
    <line x1="361" y1="446" x2="361" y2="408" marker-end="url(#arrow)"/>
    <line x1="411" y1="446" x2="411" y2="408" marker-end="url(#arrow)"/>
    <line x1="487" y1="446" x2="487" y2="408" marker-end="url(#arrow)"/>
    <line x1="544" y1="446" x2="544" y2="408" marker-end="url(#arrow)"/>
  </g>

  <!-- token row -->
  <rect x="62" y="448" width="56" height="36" rx="5" fill="#2B87B8"/>
  <text x="90" y="471" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">[CLS]</text>

  <rect x="126" y="448" width="42" height="36" rx="5" fill="#7FBFDD"/>
  <text x="147" y="471" text-anchor="middle" font-size="13" fill="#15425C"><tspan font-style="italic">q</tspan><tspan dy="3" font-size="10">1</tspan></text>
  <rect x="176" y="448" width="42" height="36" rx="5" fill="#7FBFDD"/>
  <text x="197" y="471" text-anchor="middle" font-size="13" fill="#15425C"><tspan font-style="italic">q</tspan><tspan dy="3" font-size="10">2</tspan></text>

  <rect x="226" y="448" width="56" height="36" rx="5" fill="#EEEEEE" stroke="#AAAAAA"/>
  <text x="254" y="471" text-anchor="middle" font-size="12" fill="#555555">[SEP]</text>

  <rect x="290" y="448" width="42" height="36" rx="5" fill="#F0B27E"/>
  <text x="311" y="471" text-anchor="middle" font-size="13" fill="#7A3E0F"><tspan font-style="italic">d</tspan><tspan dy="3" font-size="10">1</tspan></text>
  <rect x="340" y="448" width="42" height="36" rx="5" fill="#F0B27E"/>
  <text x="361" y="471" text-anchor="middle" font-size="13" fill="#7A3E0F"><tspan font-style="italic">d</tspan><tspan dy="3" font-size="10">2</tspan></text>
  <rect x="390" y="448" width="42" height="36" rx="5" fill="#F0B27E"/>
  <text x="411" y="471" text-anchor="middle" font-size="13" fill="#7A3E0F"><tspan font-style="italic">d</tspan><tspan dy="3" font-size="10">3</tspan></text>
  <text x="445" y="471" text-anchor="middle" font-size="14" fill="#7A3E0F">&#8230;</text>
  <rect x="466" y="448" width="42" height="36" rx="5" fill="#F0B27E"/>
  <text x="487" y="471" text-anchor="middle" font-size="13" fill="#7A3E0F"><tspan font-style="italic">d</tspan><tspan dy="3" font-size="10">n</tspan></text>

  <rect x="516" y="448" width="56" height="36" rx="5" fill="#EEEEEE" stroke="#AAAAAA"/>
  <text x="544" y="471" text-anchor="middle" font-size="12" fill="#555555">[SEP]</text>

  <!-- group labels -->
  <line x1="126" y1="492" x2="218" y2="492" stroke="#2B87B8" stroke-width="2"/>
  <text x="172" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#2B87B8">Query <tspan font-style="italic">q</tspan></text>
  <line x1="290" y1="492" x2="508" y2="492" stroke="#E87E2E" stroke-width="2"/>
  <text x="399" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#E87E2E">Document <tspan font-style="italic">d</tspan><tspan dy="3" font-size="10">i</tspan></text>

  <text x="320" y="548" text-anchor="middle" font-size="12" font-style="italic" fill="#888888">All query and document tokens attend to each other (full cross-attention)</text>
</svg>
