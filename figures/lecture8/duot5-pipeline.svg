<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="680" height="490" viewBox="0 0 680 490" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- input template -->
  <rect x="90" y="24" width="500" height="56" rx="7" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="340" y="45" text-anchor="middle" font-size="12" font-weight="bold" fill="#B35A0E">Input template</text>
  <text x="340" y="67" text-anchor="middle" font-size="12.5" font-family="Menlo, Consolas, monospace" fill="#333333">Query: {q} Document0: {d_i} Document1: {d_j} Relevant:</text>

  <line x1="340" y1="82" x2="340" y2="116" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- T5 -->
  <rect x="190" y="118" width="300" height="54" rx="8" fill="#E9F4FA" stroke="#2B87B8" stroke-width="2"/>
  <text x="340" y="140" text-anchor="middle" font-size="15" font-weight="bold" fill="#18617E">T5 Encoder&#8211;Decoder</text>
  <text x="340" y="160" text-anchor="middle" font-size="11.5" fill="#4A7A93">compares the relevance of the pair</text>

  <!-- split arrows -->
  <line x1="340" y1="172" x2="200" y2="216" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="172" x2="480" y2="216" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- outcomes -->
  <rect x="90" y="220" width="210" height="54" rx="7" fill="#FCEEDF" stroke="#E87E2E" stroke-width="1.5"/>
  <text x="195" y="242" text-anchor="middle" font-size="14" font-weight="bold" fill="#B35A0E">P(&#8220;true&#8221;)</text>
  <text x="195" y="262" text-anchor="middle" font-size="11.5" fill="#7A5230"><tspan font-style="italic">d</tspan><tspan dy="3" font-size="9" font-style="italic">i</tspan><tspan dy="-3">&#160;is more relevant</tspan></text>

  <text x="340" y="252" text-anchor="middle" font-size="13" font-weight="bold" fill="#888888">vs</text>

  <rect x="380" y="220" width="210" height="54" rx="7" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="485" y="242" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">P(&#8220;false&#8221;)</text>
  <text x="485" y="262" text-anchor="middle" font-size="11.5" fill="#33617A"><tspan font-style="italic">d</tspan><tspan dy="3" font-size="9" font-style="italic">j</tspan><tspan dy="-3">&#160;is more relevant</tspan></text>

  <!-- converge -->
  <line x1="195" y1="274" x2="310" y2="318" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="485" y1="274" x2="370" y2="318" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- aggregation -->
  <rect x="70" y="322" width="540" height="116" rx="9" fill="#E9F4FA" stroke="#2B87B8" stroke-width="2"/>
  <text x="340" y="348" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Final ranking by win/loss aggregation</text>

  <rect x="100" y="362" width="92" height="28" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
  <text x="146" y="381" text-anchor="middle" font-size="11.5" fill="#18617E"><tspan font-style="italic">d</tspan><tspan dy="2" font-size="8">1</tspan><tspan dy="-2">&#160;vs&#160;</tspan><tspan font-style="italic">d</tspan><tspan dy="2" font-size="8">2</tspan></text>
  <rect x="204" y="362" width="92" height="28" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
  <text x="250" y="381" text-anchor="middle" font-size="11.5" fill="#18617E"><tspan font-style="italic">d</tspan><tspan dy="2" font-size="8">1</tspan><tspan dy="-2">&#160;vs&#160;</tspan><tspan font-style="italic">d</tspan><tspan dy="2" font-size="8">3</tspan></text>
  <rect x="308" y="362" width="92" height="28" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
  <text x="354" y="381" text-anchor="middle" font-size="11.5" fill="#18617E"><tspan font-style="italic">d</tspan><tspan dy="2" font-size="8">2</tspan><tspan dy="-2">&#160;vs&#160;</tspan><tspan font-style="italic">d</tspan><tspan dy="2" font-size="8">3</tspan></text>
  <text x="420" y="381" text-anchor="middle" font-size="13" fill="#888888">&#8230;</text>
  <line x1="436" y1="376" x2="458" y2="376" stroke="#555555" stroke-width="1.3" marker-end="url(#arrow)"/>
  <rect x="462" y="362" width="118" height="28" rx="5" fill="#2B87B8"/>
  <text x="521" y="381" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">Final ranking</text>

  <text x="340" y="422" text-anchor="middle" font-size="11.5" fill="#666666"><tspan font-style="italic">s</tspan><tspan dy="2" font-size="8.5">duo</tspan><tspan dy="-2">(</tspan><tspan font-style="italic">q</tspan>, <tspan font-style="italic">d</tspan><tspan dy="2" font-size="8.5" font-style="italic">i</tspan><tspan dy="-2">) = &#931;</tspan><tspan dy="2" font-size="8.5" font-style="italic">j&#8800;i</tspan><tspan dy="-2">&#160;1[ P(</tspan><tspan font-style="italic">d</tspan><tspan dy="2" font-size="8.5" font-style="italic">i</tspan><tspan dy="-2">&#160;&#8827;&#160;</tspan><tspan font-style="italic">d</tspan><tspan dy="2" font-size="8.5" font-style="italic">j</tspan><tspan dy="-2">&#160;|&#160;</tspan><tspan font-style="italic">q</tspan>) &gt; 0.5 ]&#160;&#160;&#160;&#183;&#160;&#160;&#160;all pairs: O(<tspan font-style="italic">n</tspan>&#178;) / sort-based: O(<tspan font-style="italic">n</tspan> log <tspan font-style="italic">n</tspan>)</text>

  <text x="340" y="470" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">In practice duoT5 is applied only to the top-k candidates (e.g., k = 50) after monoT5</text>
</svg>
