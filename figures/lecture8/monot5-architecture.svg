<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="660" height="440" viewBox="0 0 660 440" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- input template -->
  <rect x="130" y="24" width="400" height="56" rx="7" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="330" y="45" text-anchor="middle" font-size="12" font-weight="bold" fill="#B35A0E">Input template</text>
  <text x="330" y="67" text-anchor="middle" font-size="13" font-family="Menlo, Consolas, monospace" fill="#333333">Query: {q} Document: {d} Relevant:</text>

  <line x1="330" y1="82" x2="330" y2="112" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- T5 -->
  <rect x="110" y="114" width="440" height="96" rx="9" fill="#E9F4FA" stroke="#2B87B8" stroke-width="2"/>
  <text x="330" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#18617E">T5 Encoder&#8211;Decoder</text>
  <rect x="140" y="152" width="180" height="44" rx="6" fill="#FFFFFF" stroke="#2B87B8" stroke-width="1.3"/>
  <text x="230" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#18617E">Encoder</text>
  <text x="230" y="187" text-anchor="middle" font-size="10.5" fill="#4A7A93">bidirectional encoding</text>
  <line x1="322" y1="174" x2="338" y2="174" stroke="#2B87B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="340" y="152" width="180" height="44" rx="6" fill="#FFFFFF" stroke="#2B87B8" stroke-width="1.3"/>
  <text x="430" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#18617E">Decoder</text>
  <text x="430" y="187" text-anchor="middle" font-size="10.5" fill="#4A7A93">generates the first token</text>

  <!-- split arrows -->
  <line x1="330" y1="212" x2="206" y2="258" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="212" x2="454" y2="258" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="330" y="244" text-anchor="middle" font-size="11" fill="#888888" font-style="italic">first-token probability</text>

  <!-- P(true) / P(false) -->
  <rect x="110" y="262" width="190" height="54" rx="7" fill="#FCEEDF" stroke="#E87E2E" stroke-width="1.5"/>
  <text x="205" y="284" text-anchor="middle" font-size="14" font-weight="bold" fill="#B35A0E">P(&#8220;true&#8221;)</text>
  <text x="205" y="304" text-anchor="middle" font-size="11.5" fill="#7A5230">probability of relevance</text>

  <rect x="360" y="262" width="190" height="54" rx="7" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="455" y="284" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">P(&#8220;false&#8221;)</text>
  <text x="455" y="304" text-anchor="middle" font-size="11.5" fill="#33617A">probability of non-relevance</text>

  <!-- converge -->
  <line x1="205" y1="316" x2="304" y2="358" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="455" y1="316" x2="356" y2="358" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- score -->
  <rect x="120" y="362" width="420" height="46" rx="7" fill="#FFFFFF" stroke="#555555" stroke-width="1.5"/>
  <text x="330" y="391" text-anchor="middle" font-size="14.5" fill="#333333"><tspan font-style="italic">s</tspan>(<tspan font-style="italic">q</tspan>, <tspan font-style="italic">d</tspan>) = log P(&#8220;true&#8221;) &#8722; log P(&#8220;false&#8221;)</text>
</svg>
