<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="900" height="520" viewBox="0 0 900 520" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- ===== input list ===== -->
  <rect x="30" y="40" width="200" height="340" rx="9" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="130" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">BM25 top 100</text>
  <text x="130" y="86" text-anchor="middle" font-size="10.5" fill="#5B87A0">(input in reverse order)</text>

  <rect x="50" y="100" width="160" height="28" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
  <text x="130" y="119" text-anchor="middle" font-size="12" fill="#18617E">[100] <tspan font-style="italic">d</tspan><tspan dy="3" font-size="9">100</tspan></text>
  <rect x="50" y="136" width="160" height="28" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
  <text x="130" y="155" text-anchor="middle" font-size="12" fill="#18617E">[99] <tspan font-style="italic">d</tspan><tspan dy="3" font-size="9">99</tspan></text>
  <rect x="50" y="172" width="160" height="28" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
  <text x="130" y="191" text-anchor="middle" font-size="12" fill="#18617E">[98] <tspan font-style="italic">d</tspan><tspan dy="3" font-size="9">98</tspan></text>
  <text x="130" y="236" text-anchor="middle" font-size="16" fill="#5B87A0">&#8942;</text>
  <rect x="50" y="256" width="160" height="28" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
  <text x="130" y="275" text-anchor="middle" font-size="12" fill="#18617E">[1] <tspan font-style="italic">d</tspan><tspan dy="3" font-size="9">1</tspan></text>

  <line x1="232" y1="210" x2="296" y2="210" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== LLM panel ===== -->
  <rect x="300" y="40" width="320" height="340" rx="9" fill="#FDF4EA" stroke="#E87E2E" stroke-width="1.8"/>
  <text x="460" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#B35A0E">LLM (e.g., GPT-4)</text>
  <text x="460" y="86" text-anchor="middle" font-size="10.5" fill="#9C7A56">sliding-window reranking</text>

  <rect x="330" y="100" width="210" height="40" rx="5" fill="#FFFFFF" stroke="#E8A05D"/>
  <text x="340" y="117" font-size="12" font-weight="bold" fill="#B35A0E">Pass 1</text>
  <text x="340" y="133" font-size="11" fill="#7A5230">reorder ranks [81&#8211;100]</text>
  <text x="565" y="125" font-size="11" fill="#9C7A56"><tspan font-style="italic">w</tspan> = 20</text>

  <rect x="330" y="152" width="210" height="40" rx="5" fill="#FFFFFF" stroke="#E8A05D"/>
  <text x="340" y="169" font-size="12" font-weight="bold" fill="#B35A0E">Pass 2</text>
  <text x="340" y="185" font-size="11" fill="#7A5230">reorder ranks [71&#8211;90]</text>
  <text x="565" y="177" font-size="11" fill="#9C7A56"><tspan font-style="italic">w</tspan> = 20</text>

  <text x="435" y="226" text-anchor="middle" font-size="16" fill="#9C7A56">&#8942;</text>

  <rect x="330" y="246" width="210" height="40" rx="5" fill="#FFFFFF" stroke="#E8A05D"/>
  <text x="340" y="263" font-size="12" font-weight="bold" fill="#B35A0E">Pass 9</text>
  <text x="340" y="279" font-size="11" fill="#7A5230">reorder ranks [1&#8211;20]</text>
  <text x="565" y="271" font-size="11" fill="#9C7A56"><tspan font-style="italic">w</tspan> = 20</text>

  <text x="460" y="330" text-anchor="middle" font-size="11.5" font-style="italic" fill="#C2620E">relevant documents gradually bubble up</text>
  <text x="460" y="348" text-anchor="middle" font-size="11.5" font-style="italic" fill="#C2620E">toward the top (like one pass of bubble sort)</text>

  <line x1="622" y1="210" x2="686" y2="210" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== output ===== -->
  <rect x="690" y="40" width="180" height="340" rx="9" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="780" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Output</text>
  <text x="780" y="86" text-anchor="middle" font-size="10.5" fill="#5B87A0">reranked list</text>

  <rect x="710" y="100" width="140" height="28" rx="5" fill="#2B87B8"/>
  <text x="780" y="119" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">1.  <tspan font-style="italic">d</tspan><tspan dy="3" font-size="9">5</tspan></text>
  <rect x="710" y="136" width="140" height="28" rx="5" fill="#7FBFDD"/>
  <text x="780" y="155" text-anchor="middle" font-size="12" fill="#15425C">2.  <tspan font-style="italic">d</tspan><tspan dy="3" font-size="9">1</tspan></text>
  <rect x="710" y="172" width="140" height="28" rx="5" fill="#BBDDEE"/>
  <text x="780" y="191" text-anchor="middle" font-size="12" fill="#15425C">3.  <tspan font-style="italic">d</tspan><tspan dy="3" font-size="9">8</tspan></text>
  <text x="780" y="236" text-anchor="middle" font-size="16" fill="#5B87A0">&#8942;</text>
  <rect x="710" y="256" width="140" height="28" rx="5" fill="#FFFFFF" stroke="#7FB8D6"/>
  <text x="780" y="275" text-anchor="middle" font-size="12" fill="#18617E">100.  <tspan font-style="italic">d</tspan><tspan dy="3" font-size="9">42</tspan></text>

  <!-- ===== parameters bar ===== -->
  <rect x="30" y="416" width="840" height="64" rx="8" fill="#EFF7FB" stroke="#B9D8E8" stroke-width="1.5"/>
  <text x="450" y="441" text-anchor="middle" font-size="13" font-weight="bold" fill="#18617E">Parameters and complexity</text>
  <text x="450" y="464" text-anchor="middle" font-size="12.5" fill="#33617A">window <tspan font-style="italic">w</tspan> = 20&#160;&#160;&#183;&#160;&#160;stride <tspan font-style="italic">s</tspan> = 10&#160;&#160;&#183;&#160;&#160;9 passes&#160;&#160;&#183;&#160;&#160;few LLM calls per query, but a very large input token count</text>
</svg>
