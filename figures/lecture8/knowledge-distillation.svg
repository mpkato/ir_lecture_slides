<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="760" height="425" viewBox="0 0 760 425" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- teacher -->
  <rect x="230" y="36" width="300" height="92" rx="9" fill="#FDF4EA" stroke="#E87E2E" stroke-width="2"/>
  <text x="380" y="64" text-anchor="middle" font-size="16" font-weight="bold" fill="#B35A0E">Teacher model</text>
  <text x="380" y="88" text-anchor="middle" font-size="12" fill="#7A5230">large &#183; accurate &#183; slow</text>
  <text x="380" y="108" text-anchor="middle" font-size="11" fill="#9C7A56">e.g., monoT5-3B / BERT-Large</text>

  <!-- size chips -->
  <rect x="100" y="58" width="100" height="26" rx="13" fill="#F4D2AE"/>
  <text x="150" y="75" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#7A3E0F">3B params</text>
  <rect x="100" y="272" width="100" height="26" rx="13" fill="#BBDDEE"/>
  <text x="150" y="289" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#15425C">14M params</text>
  <path d="M150,92 L150,264" stroke="#AAAAAA" stroke-width="1.3" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <text x="142" y="184" text-anchor="end" font-size="11" font-style="italic" fill="#777777">~200&#215; smaller</text>

  <!-- soft labels -->
  <line x1="380" y1="128" x2="380" y2="160" stroke="#555555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="300" y="164" width="160" height="34" rx="17" fill="#E87E2E"/>
  <text x="380" y="186" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Soft labels</text>
  <line x1="380" y1="198" x2="380" y2="230" stroke="#555555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="475" y="186" font-size="12" font-style="italic" fill="#C2620E">knowledge transfer</text>

  <!-- student -->
  <rect x="230" y="234" width="300" height="92" rx="9" fill="#E9F4FA" stroke="#2B87B8" stroke-width="2"/>
  <text x="380" y="262" text-anchor="middle" font-size="16" font-weight="bold" fill="#18617E">Student model</text>
  <text x="380" y="286" text-anchor="middle" font-size="12" fill="#33617A">small &#183; fast</text>
  <text x="380" y="306" text-anchor="middle" font-size="11" fill="#5B87A0">e.g., 4-layer BERT</text>

  <!-- ground truth -->
  <rect x="30" y="318" width="150" height="56" rx="7" fill="#F2F2F2" stroke="#BBBBBB" stroke-width="1.5"/>
  <text x="105" y="341" text-anchor="middle" font-size="13" font-weight="bold" fill="#444444">Ground truth</text>
  <text x="105" y="360" text-anchor="middle" font-size="11" fill="#777777">hard labels</text>
  <path d="M182,346 L240,346 L240,330" fill="none" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- loss -->
  <rect x="580" y="240" width="160" height="80" rx="7" fill="#FFFFFF" stroke="#888888" stroke-width="1.5"/>
  <text x="660" y="266" text-anchor="middle" font-size="13" font-weight="bold" fill="#444444">Loss function</text>
  <text x="660" y="288" text-anchor="middle" font-size="12" fill="#333333"><tspan font-style="italic">L</tspan> = &#945; &#183; <tspan font-style="italic">L</tspan><tspan dy="3" font-size="9">hard</tspan></text>
  <text x="660" y="308" text-anchor="middle" font-size="12" fill="#333333">+ (1 &#8722; &#945;) &#183; <tspan font-style="italic">L</tspan><tspan dy="3" font-size="9">soft</tspan></text>
  <line x1="532" y1="280" x2="576" y2="280" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="380" y="408" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">A 4-layer student nearly matches the 12-layer teacher at ~3&#215; faster inference (Gao et al., 2020)</text>
</svg>
