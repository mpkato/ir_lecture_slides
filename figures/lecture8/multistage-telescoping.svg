<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="900" height="460" viewBox="0 0 900 460" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- stage labels -->
  <text x="130" y="46" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2B87B8" letter-spacing="1">STAGE 1</text>
  <text x="400" y="46" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2B87B8" letter-spacing="1">STAGE 2</text>
  <text x="660" y="46" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#E87E2E" letter-spacing="1">STAGE 3</text>

  <!-- stage 1 -->
  <rect x="40" y="58" width="180" height="92" rx="9" fill="#E9F4FA" stroke="#2B87B8" stroke-width="2"/>
  <text x="130" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#18617E">BM25</text>
  <text x="130" y="112" text-anchor="middle" font-size="12" fill="#33617A">1,000 docs</text>
  <text x="130" y="132" text-anchor="middle" font-size="12" fill="#33617A">~10 ms</text>

  <line x1="222" y1="104" x2="296" y2="104" stroke="#555555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="259" y="94" text-anchor="middle" font-size="11" fill="#666666">top 1,000</text>

  <!-- stage 2 -->
  <rect x="300" y="58" width="200" height="92" rx="9" fill="#E9F4FA" stroke="#2B87B8" stroke-width="2"/>
  <text x="400" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#18617E">monoBERT / monoT5</text>
  <text x="400" y="112" text-anchor="middle" font-size="12" fill="#33617A">100 docs</text>
  <text x="400" y="132" text-anchor="middle" font-size="12" fill="#33617A">~3 s</text>

  <line x1="502" y1="104" x2="566" y2="104" stroke="#555555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="534" y="94" text-anchor="middle" font-size="11" fill="#666666">top 100</text>

  <!-- stage 3 -->
  <rect x="570" y="58" width="180" height="92" rx="9" fill="#FDF4EA" stroke="#E87E2E" stroke-width="2"/>
  <text x="660" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#B35A0E">duoT5</text>
  <text x="660" y="112" text-anchor="middle" font-size="12" fill="#7A5230">10 docs</text>
  <text x="660" y="132" text-anchor="middle" font-size="12" fill="#7A5230">~5 s</text>

  <line x1="752" y1="104" x2="796" y2="104" stroke="#555555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="774" y="94" text-anchor="middle" font-size="11" fill="#666666">top 10</text>

  <!-- final -->
  <rect x="800" y="74" width="80" height="60" rx="8" fill="#2B87B8"/>
  <text x="840" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Top 10</text>
  <text x="840" y="118" text-anchor="middle" font-size="11" fill="#D9ECF5">results</text>

  <!-- telescoping funnel -->
  <polygon points="40,200 880,266 880,310 40,376" fill="#EAF4FA" stroke="#B9D8E8" stroke-width="1.5"/>
  <rect x="60" y="266" width="100" height="32" rx="5" fill="#2B87B8"/>
  <text x="110" y="287" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">1,000 docs</text>
  <rect x="400" y="272" width="90" height="30" rx="5" fill="#7FBFDD"/>
  <text x="445" y="292" text-anchor="middle" font-size="12" font-weight="bold" fill="#15425C">100 docs</text>
  <rect x="660" y="275" width="80" height="28" rx="5" fill="#E87E2E"/>
  <text x="700" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">10 docs</text>

  <!-- axes -->
  <line x1="60" y1="408" x2="840" y2="408" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="450" y="434" text-anchor="middle" font-size="13" fill="#555555">Candidate reduction (telescoping) &#8212; later stages are <tspan font-weight="bold">more accurate but slower per document</tspan> &#8594;</text>
</svg>
