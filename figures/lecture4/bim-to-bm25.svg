<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="640" height="480" viewBox="0 0 640 480" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="320" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">From BIM to BM25 &#8212; A Theoretical Bridge</text>

  <!-- BIM -->
  <rect x="120" y="60" width="400" height="76" rx="9" fill="#E9F4FA" stroke="#7FB8D6" stroke-width="1.8"/>
  <text x="320" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#33759B">BIM (Binary Independence Model)</text>
  <text x="320" y="112" text-anchor="middle" font-size="12" fill="#33617A">term presence/absence only &#8212; tf is ignored &#183; RSJ weights &#8776; IDF</text>

  <line x1="320" y1="136" x2="320" y2="172" stroke="#555555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="335" y="158" font-size="11.5" font-weight="bold" fill="#2B87B8">2-Poisson model: elite vs non-elite terms</text>

  <!-- TF saturation -->
  <rect x="120" y="174" width="400" height="76" rx="9" fill="#D6E9F4" stroke="#2B87B8" stroke-width="1.8"/>
  <text x="320" y="202" text-anchor="middle" font-size="15" font-weight="bold" fill="#18617E">+ TF saturation</text>
  <text x="320" y="226" text-anchor="middle" font-size="12" fill="#33617A">tf&#8202;(<tspan font-style="italic">k</tspan><tspan dy="2" font-size="9">1</tspan><tspan dy="-2">+1) / (tf+</tspan><tspan font-style="italic">k</tspan><tspan dy="2" font-size="9">1</tspan><tspan dy="-2">) &#8212; diminishing returns for repeated terms</tspan></text>

  <line x1="320" y1="250" x2="320" y2="286" stroke="#555555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="335" y="272" font-size="11.5" font-weight="bold" fill="#E87E2E">account for document length effects</text>

  <!-- BM25 -->
  <rect x="120" y="288" width="400" height="76" rx="9" fill="#E87E2E"/>
  <text x="320" y="316" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">BM25</text>
  <text x="320" y="340" text-anchor="middle" font-size="12" fill="#FBE3CD">+ document length normalization (parameter <tspan font-style="italic">b</tspan>) &#8594; complete form</text>

  <text x="320" y="402" text-anchor="middle" font-size="12.5" fill="#555555">Intuition: going from 1 to 5 occurrences adds information; going from 50 to 55 barely changes anything</text>
  <text x="320" y="432" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">IDF and TF saturation are derived from first principles of the probabilistic model (Robertson, 2004)</text>
</svg>
