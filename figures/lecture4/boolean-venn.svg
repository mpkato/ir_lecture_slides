<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="660" height="480" viewBox="0 0 660 480" font-family="Helvetica, Arial, sans-serif">

  <!-- universe -->
  <rect x="40" y="40" width="580" height="320" rx="12" fill="#FAFAFA" stroke="#BBBBBB" stroke-width="1.5"/>
  <text x="595" y="66" text-anchor="end" font-size="12" fill="#888888">Document universe <tspan font-style="italic">U</tspan></text>

  <!-- circles -->
  <circle cx="260" cy="210" r="115" fill="#2B87B8" fill-opacity="0.22" stroke="#2B87B8" stroke-width="2.5"/>
  <circle cx="400" cy="210" r="115" fill="#E87E2E" fill-opacity="0.22" stroke="#E87E2E" stroke-width="2.5"/>

  <text x="195" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E"><tspan font-style="italic">D</tspan><tspan dy="3" font-size="10">information</tspan></text>
  <text x="468" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#B35A0E"><tspan font-style="italic">D</tspan><tspan dy="3" font-size="10">retrieval</tspan></text>

  <!-- documents -->
  <text x="185" y="216" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E"><tspan font-style="italic">d</tspan><tspan dy="3" font-size="11">2</tspan></text>
  <text x="330" y="206" text-anchor="middle" font-size="14" font-weight="bold" fill="#333333"><tspan font-style="italic">d</tspan><tspan dy="3" font-size="11">1</tspan></text>
  <text x="330" y="228" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#555555">AND</text>
  <text x="476" y="216" text-anchor="middle" font-size="14" font-weight="bold" fill="#B35A0E"><tspan font-style="italic">d</tspan><tspan dy="3" font-size="11">3</tspan></text>

  <!-- legend chips -->
  <rect x="60" y="390" width="170" height="40" rx="7" fill="#E9F4FA" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="145" y="415" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#18617E">AND = intersection &#8745;</text>

  <rect x="250" y="390" width="160" height="40" rx="7" fill="#EAF4FA" stroke="#7FB8D6" stroke-width="1.5"/>
  <text x="330" y="415" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#33759B">OR = union &#8746;</text>

  <rect x="430" y="390" width="170" height="40" rx="7" fill="#F7F7F7" stroke="#999999" stroke-width="1.5"/>
  <text x="515" y="415" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#555555">NOT = complement</text>

  <text x="330" y="462" text-anchor="middle" font-size="11" font-style="italic" fill="#888888">Each term&#8217;s posting list is the set <tspan font-style="italic">D</tspan><tspan dy="2" font-size="9" font-style="italic">t</tspan><tspan dy="-2"> &#8212; Boolean operators execute set operations on the inverted index</tspan></text>
</svg>
