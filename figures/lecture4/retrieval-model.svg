<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="620" height="420" viewBox="0 0 620 420" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <text x="310" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#333333">Common Structure of Retrieval Models</text>

  <rect x="80" y="70" width="190" height="48" rx="8" fill="#DDEEF7" stroke="#2B87B8" stroke-width="1.5"/>
  <text x="175" y="99" text-anchor="middle" font-size="14" font-weight="bold" fill="#18617E">Query <tspan font-style="italic">q</tspan></text>

  <rect x="350" y="70" width="190" height="48" rx="8" fill="#FCEEDF" stroke="#E8A05D" stroke-width="1.5"/>
  <text x="445" y="99" text-anchor="middle" font-size="14" font-weight="bold" fill="#B35A0E">Document <tspan font-style="italic">d</tspan></text>

  <line x1="175" y1="118" x2="266" y2="168" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="445" y1="118" x2="354" y2="168" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="160" y="170" width="300" height="64" rx="9" fill="#2B87B8"/>
  <text x="310" y="197" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Retrieval model</text>
  <text x="310" y="219" text-anchor="middle" font-size="11.5" fill="#D9ECF5">computes a relevance score</text>

  <line x1="310" y1="234" x2="310" y2="268" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="160" y="270" width="300" height="48" rx="8" fill="#E87E2E"/>
  <text x="310" y="299" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">score(<tspan font-style="italic">q</tspan>, <tspan font-style="italic">d</tspan>) &#8594; ranking</text>

  <text x="310" y="360" text-anchor="middle" font-size="12" fill="#555555">Each model rests on a different mathematical foundation:</text>
  <text x="310" y="380" text-anchor="middle" font-size="12" fill="#555555">set theory &#183; linear algebra &#183; probability theory &#183; statistical language models</text>
</svg>
